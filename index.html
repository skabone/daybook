  /* ---------- AI intake (round-trip via Claude) ---------- */
  function buildAIPrompt(blurb){
    var names=S.projects.map(function(p){return p.name;}).join(", ")||"none yet";
    return "You are helping me fill in my personal planner app, Daybook. I'll give you a brain-dump below.\n\n"+
      "STEP 1 — Ask me a few brief clarifying questions for anything missing (dates, which project, priority, job stage, who an email is from, etc.). Keep it short.\n\n"+
      "STEP 2 — After I answer, reply with ONLY a single fenced ```json code block in exactly this shape. Omit any field or array you have nothing for:\n"+
      "```json\n{\n  \"focusToday\": \"string\",\n  \"projects\": [{\"name\": \"string\"}],\n  \"tasks\": [{\"title\": \"string\", \"project\": \"string\", \"day\": \"YYYY-MM-DD\", \"block\": \"morning|afternoon|evening\", \"priority\": true}],\n  \"events\": [{\"title\": \"string\", \"date\": \"YYYY-MM-DD\", \"project\": \"string\"}],\n  \"jobs\": [{\"company\": \"string\", \"role\": \"string\", \"stage\": \"Saved|Applied|Interviewing|Offer|Closed\", \"next\": \"string\", \"link\": \"string\", \"notes\": \"string\"}],\n  \"emails\": [{\"subject\": \"string\", \"sender\": \"string\"}],\n  \"notes\": [\"string\"]\n}\n```\n\n"+
      "Rules: today is "+today()+" — use real YYYY-MM-DD dates. \"project\" is a name; reuse one of my existing projects if it fits ("+names+"), otherwise choose a sensible new name. Don't invent anything I didn't say.\n\n"+
      "My brain-dump:\n\"\"\"\n"+blurb+"\n\"\"\"";
  }
  function extractJSON(text){
    if(!text) return null;
    var m=text.match(/```(?:json)?\s*([\s\S]*?)```/i); var raw=m?m[1]:text; raw=raw.trim();
    if(!m){ var s=raw.indexOf("{"), e=raw.lastIndexOf("}"); if(s>=0&&e>s) raw=raw.slice(s,e+1); }
    try{ return JSON.parse(raw); }catch(err){ return null; }
  }
  function previewAIImport(text){
    var d=extractJSON(text);
    if(!d){ toast("Couldn't read that — paste Claude's ```json block"); return; }
    var items=[];
    function arr(a){ return Array.isArray(a)?a:[]; }
    if(d.focusToday) items.push("<b>Focus:</b> "+esc(String(d.focusToday)));
    arr(d.projects).forEach(function(p){ if(p&&p.name) items.push("<b>Project:</b> "+esc(String(p.name))); });
    arr(d.tasks).forEach(function(k){ if(k&&k.title) items.push("<b>Task:</b> "+esc(String(k.title))+(validDate(k.day)?" · "+niceDate(k.day):"")); });
    arr(d.events).forEach(function(ev){ if(ev&&ev.title&&validDate(ev.date)) items.push("<b>Event:</b> "+esc(String(ev.title))+" · "+niceDate(ev.date)); });
    arr(d.jobs).forEach(function(j){ if(j&&j.company) items.push("<b>Job:</b> "+esc(String(j.company))+(j.role?" — "+esc(String(j.role)):"")); });
    arr(d.emails).forEach(function(e){ if(e&&e.subject) items.push("<b>Email:</b> "+esc(String(e.subject))); });
    arr(d.notes).forEach(function(nt){ if(nt) items.push("<b>Note:</b> "+esc(String(nt).slice(0,80))+(String(nt).length>80?"…":"")); });
    if(!items.length){ toast("Nothing to import in that reply"); return; }
    modal('<h3>Import from Claude</h3><p class="sub">'+items.length+' item'+(items.length===1?"":"s")+' will be added. Nothing changes until you confirm.</p>'+
      '<div class="card" style="font-size:13.5px;line-height:1.7;max-height:45vh;overflow:auto">'+items.map(function(c){return "• "+c;}).join("<br>")+'</div>'+
      '<div class="modal-actions"><button class="btn ghost" data-x>Cancel</button><button class="btn primary" id="ai-go">Add it all</button></div>');
    document.querySelector("[data-x]").onclick=close;
    document.getElementById("ai-go").onclick=function(){ applyAIImport(d); close(); render(); };
  }
  function projByName(name){ if(!name)return null; var p=S.projects.find(function(x){return x.name.toLowerCase()===String(name).toLowerCase();}); if(!p){ p={id:uid(),name:name,color:COLORS[S.projects.length%COLORS.length],notes:""}; S.projects.push(p); } return p; }
  function validDate(s){ return (typeof s==="string"&&/^\d{4}-\d{2}-\d{2}$/.test(s))?s:null; }
  function applyAIImport(d){
    var t=today(), n=0;
    if(d.focusToday){ S.focus[t]=S.focus[t]||[]; S.focus[t].push({id:uid(),text:String(d.focusToday),done:false}); n++; }
    (d.projects||[]).forEach(function(p){ if(p&&p.name){ projByName(p.name); n++; } });
    (d.tasks||[]).forEach(function(k){ if(!k||!k.title)return; var pid=k.project?projByName(k.project).id:null; var bl=["morning","afternoon","evening"].indexOf(k.block)>=0?k.block:null; S.tasks.push({id:uid(),title:String(k.title),projectId:pid,status:"todo",day:validDate(k.day)||t,block:bl,priority:!!k.priority,rollover:0,created:t}); n++; });
    (d.events||[]).forEach(function(ev){ if(!ev||!ev.title||!validDate(ev.date))return; var pid=ev.project?projByName(ev.project).id:null; S.events.push({id:uid(),title:String(ev.title),date:validDate(ev.date),projectId:pid,source:"ai"}); n++; });
    (d.jobs||[]).forEach(function(j){ if(!j||!j.company)return; var st=JOB_STAGES.indexOf(j.stage)>=0?j.stage:"Saved"; S.jobs.push({id:uid(),company:String(j.company),role:j.role||"",stage:st,next:j.next||"",link:j.link||"",notes:j.notes||""}); n++; });
    (d.emails||[]).forEach(function(e){ if(!e||!e.subject)return; S.emails.unshift({id:uid(),subject:String(e.subject),sender:e.sender||"",done:false,created:t}); n++; });
    (d.notes||[]).forEach(function(nt){ if(!nt)return; S.notes[t]=(S.notes[t]?S.notes[t]+"\n":"")+String(nt); n++; });
    fillProjSelect(); save(); toast("Added "+n+" item"+(n===1?"":"s")+" from Claude");
  }
  /* ---------- global search ---------- */
  function openSearchModal(){
    modal('<h3>Search</h3><div class="fld" style="margin-top:10px"><input id="srch" placeholder="Tasks, people, jobs, events, notes…" aria-label="Search everything"/></div>'+
      '<div id="srch-res"><div class="empty">Type at least 2 characters</div></div>'+
      '<div class="modal-actions"><button class="btn ghost" data-x>Close</button></div>');
    document.querySelector("[data-x]").onclick=close;
    var inp=document.getElementById("srch"), out=document.getElementById("srch-res");
    function row(kind,key,title,sub){ return '<div class="srch-row" data-kind="'+kind+'" data-key="'+esc(key)+'"><span class="srch-kind">'+kind+'</span>'+esc(title)+(sub?'<div class="srch-sub">'+esc(sub)+'</div>':"")+'</div>'; }
    inp.oninput=function(){
      var q=norm(inp.value);
      if(q.length<2){ out.innerHTML='<div class="empty">Type at least 2 characters</div>'; return; }
      var rows=[];
      S.tasks.forEach(function(k){ if(rows.length<40 && norm(k.title).indexOf(q)>=0){ var p=proj(k.projectId); rows.push(row("task",k.id,k.title,(k.day?niceDate(k.day):"someday")+(k.status==="done"?" · done":"")+(p?" · "+p.name:""))); } });
      S.people.forEach(function(p){ if(rows.length<40 && (norm(p.name)+" "+norm(p.company)+" "+norm(p.notes)).indexOf(q)>=0) rows.push(row("person",p.id,p.name,p.relationship||p.company||"")); });
      S.jobs.forEach(function(j){ if(rows.length<40 && (norm(j.company)+" "+norm(j.role)+" "+norm(j.notes)).indexOf(q)>=0) rows.push(row("job",j.id,j.company+(j.role?" — "+j.role:""),j.stage||"")); });
      S.projects.forEach(function(p){ if(rows.length<40 && (norm(p.name)+" "+norm(p.notes)).indexOf(q)>=0) rows.push(row("project",p.id,p.name,"")); });
      S.events.forEach(function(ev){ if(rows.length<40 && sourceEnabled(ev) && norm(ev.title).indexOf(q)>=0) rows.push(row("event",ev.id,ev.title,ev.date?niceDate(ev.date):"")); });
      S.emails.forEach(function(em){ if(rows.length<40 && (norm(em.subject)+" "+norm(em.sender)).indexOf(q)>=0) rows.push(row("email",em.id,em.subject,em.sender||"")); });
      Object.keys(S.notes).forEach(function(dk){ if(rows.length<40 && norm(S.notes[dk]).indexOf(q)>=0) rows.push(row("note",dk,S.notes[dk].slice(0,70),niceDate(dk))); });
      out.innerHTML=rows.length?rows.join(""):'<div class="empty">No matches</div>';
    };
    out.onclick=function(e){ var r=e.target.closest(".srch-row"); if(!r)return; var kind=r.dataset.kind, key=r.dataset.key;
      if(kind==="task"){ var tk=S.tasks.find(function(x){return x.id===key;}); if(tk){ close(); openTaskModal({edit:tk}); } }
      else if(kind==="person"){ var pe=S.people.find(function(x){return x.id===key;}); if(pe){ close(); openPersonModal(pe); } }
      else if(kind==="job"){ var jb=S.jobs.find(function(x){return x.id===key;}); if(jb){ close(); openJobModal(jb); } }
      else if(kind==="project"){ var pr=proj(key); if(pr){ close(); openProjModal(pr); } }
      else if(kind==="event"){ var ev=S.events.find(function(x){return x.id===key;}); if(ev){ close(); openDayModal(ev.date); } }
      else if(kind==="note"){ close(); openDayModal(key); }
      else if(kind==="email"){ close(); view="hub"; [].forEach.call(nav.children,function(c){c.setAttribute("aria-current",c.dataset.view==="hub"?"true":"false");}); render(); }
    };
  }

  function copyText(txt,cb){
    if(navigator.clipboard&&navigator.clipboard.writeText){ navigator.clipboard.writeText(txt).then(cb||function(){},function(){ fallbackCopy(txt); if(cb)cb(); }); }
    else { fallbackCopy(txt); if(cb)cb(); }
  }
  function fallbackCopy(txt){ var ta=document.createElement("textarea"); ta.value=txt; ta.style.position="fixed"; ta.style.opacity="0"; document.body.appendChild(ta); ta.focus(); ta.select(); try{document.execCommand("copy");}catch(e){} document.body.removeChild(ta); }

  /* ---------- boot ---------- */
  document.getElementById("cap-btn").onclick=function(){ view="hub"; [].forEach.call(nav.children,function(c){c.setAttribute("aria-current",c.dataset.view==="hub"?"true":"false");}); render(); document.querySelector(".hub-cap")&&document.getElementById("cap-in")&&document.getElementById("cap-in").focus(); };
  document.addEventListener("keydown",function(e){
    if(e.key==="Escape"){ var mr=document.getElementById("modal-root"); if(mr&&mr.children.length) close(); return; }
    if((e.key==="n"||e.key==="/")&&!e.metaKey&&!e.ctrlKey&&!e.altKey){
      var tg=e.target, tag=tg.tagName;
      if(tag==="INPUT"||tag==="TEXTAREA"||tag==="SELECT"||tg.isContentEditable) return;
      if(document.getElementById("modal-root").children.length) return;
      e.preventDefault(); if(e.key==="/") openSearchModal(); else qInput.focus();
    }
  });
  document.getElementById("search-btn").onclick=openSearchModal;
  // catch the day change if the app stays open past midnight (tab or home-screen app)
  function checkDay(){ if(S.lastOpen!==today()){ viewDay=today(); onOpen(); render(); } }
  document.addEventListener("visibilitychange",function(){ if(!document.hidden) checkDay(); });
  setInterval(checkDay,60000);
  if(navigator.storage&&navigator.storage.persist){ try{ navigator.storage.persist(); }catch(e){} }
  idbGet("syncName",function(n){ syncName=n; });
  idbGet("syncHandle",function(h){ if(!h||!h.queryPermission) return; syncHandle=h;
    h.queryPermission({mode:"readwrite"}).then(function(p){
      if(p==="granted") syncRead();
      else { syncReconnect=true; if(view==="today") render(); }
    }).catch(function(){});
  });
  setInterval(updateClock,1000);
  fillProjSelect();
  onOpen();
  render();
  refreshCalendars(function(){ if(view==="calendar") render(); });
  ghPull();
  document.addEventListener("visibilitychange",function(){ if(!document.hidden) ghPull(); });
})();
</script>
