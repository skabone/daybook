  function openPalette(){
    modal('<div class="fld" style="margin:0"><input id="pal-in" placeholder="Type a command, or search open tasks…" aria-label="Command palette"/></div>'+
      '<div id="pal-res" style="margin-top:10px;max-height:52vh;overflow:auto"></div>'+
      '<div class="sub" style="font-size:10.5px;margin:10px 0 0">↑↓ to choose · Enter to run · Esc to close</div>');
    var inp=document.getElementById("pal-in"), out=document.getElementById("pal-res");
    var items=[], idx=0;
    function paint(){
      out.innerHTML=items.length?items.map(function(it,i){
        return '<div class="srch-row pal-row'+(i===idx?" sel":"")+'" data-i="'+i+'"><span>'+it.icon+'</span><span style="flex:1">'+esc(it.label)+'</span>'+(it.hint?'<span class="ac-hint">'+esc(it.hint)+'</span>':"")+'</div>';
      }).join(""):'<div class="empty">No matches</div>';
      var sel=out.querySelector(".sel"); if(sel&&sel.scrollIntoView) sel.scrollIntoView({block:"nearest"});
    }
    function build(q){
      q=norm(q);
      var res=paletteActions().filter(function(it){ return !q||norm(it.label).indexOf(q)>=0; });
      if(q.length>=2){
        S.tasks.forEach(function(k){
          if(res.length>=16||k.status==="done") return;
          if(norm(k.title+" "+htmlToText(k.notes)+" "+(k.subs||[]).map(function(s){return s.text;}).join(" ")).indexOf(q)>=0){
            res.push({icon:"☐",label:k.title,hint:k.day?niceDate(k.day):"someday",run:function(){ openTaskModal({edit:k}); }});
          }
        });
      }
      items=res.slice(0,16); idx=0; paint();
    }
    inp.oninput=function(){ build(inp.value); };
    inp.onkeydown=function(e){
      if(e.key==="ArrowDown"){ e.preventDefault(); if(items.length){ idx=(idx+1)%items.length; paint(); } }
      else if(e.key==="ArrowUp"){ e.preventDefault(); if(items.length){ idx=(idx-1+items.length)%items.length; paint(); } }
      else if(e.key==="Enter"){ e.preventDefault(); var it=items[idx]; if(it){ close(); it.run(); } }
    };
    out.onclick=function(e){ var r=e.target.closest(".pal-row"); if(!r) return; var it=items[+r.dataset.i]; close(); if(it) it.run(); };
    build("");
  }

  /* ---------- weekly review — celebrate, clear, choose ---------- */
  function openReviewModal(){
    function body(){
      var t=today(), wk=addDays(t,-6);
      var doneWk=S.tasks.filter(function(k){return k.completedOn&&k.completedOn>=wk;});
      var byDay={}; doneWk.forEach(function(k){ byDay[k.completedOn]=(byDay[k.completedOn]||0)+1; });
      var best=Object.keys(byDay).sort(function(a,b){return byDay[b]-byDay[a];})[0];
      var carried=S.tasks.filter(function(k){return k.status==="todo"&&(k.rollover||0)>=1;}).slice(0,8);
      var someday=S.tasks.filter(function(k){return !k.day&&k.status!=="done";}).slice(0,6);
      var h='<h3>🧹 Weekly review</h3><p class="sub">Two minutes: celebrate, clear, choose.</p>';
      h+='<div class="ins-tiles" style="margin-top:6px">'+
        '<div class="ins-tile"><b>✅ '+doneWk.length+'</b><span>done · last 7 days</span></div>'+
        '<div class="ins-tile"><b>🔥 '+doneStreak()+'</b><span>day streak</span></div>'+
        (best?'<div class="ins-tile"><b>🏆 '+DOWNAMES[dow(best)]+'</b><span>best day · '+byDay[best]+' done</span></div>':'')+'</div>';
      h+='<div class="fld"><label>Carried over — decide, don\'t drag</label>'+
        (carried.length?carried.map(function(k){
          return '<div class="panel-task"><div class="task-title" style="font-size:13.5px">'+esc(k.title)+' <span class="pill aged">'+k.rollover+'d</span></div>'+
            '<div class="panel-move">'+[["today","📅 Today"],["tomorrow","→ Tomorrow"],["someday","💭 Someday"],["done","✓ Done"],["drop","✕ Drop"]].map(function(m){return '<button data-rv="'+m[0]+'" data-id="'+k.id+'">'+m[1]+'</button>';}).join("")+'</div></div>';
        }).join(""):'<div class="empty">Nothing carried 🎉</div>')+'</div>';
      h+='<div class="fld"><label>Someday shelf — anything ready to schedule?</label>'+
        (someday.length?someday.map(function(k){
          return '<div class="panel-task"><div class="task-title" style="font-size:13.5px">'+esc(k.title)+'</div>'+
            '<div class="panel-move">'+[["today","📅 Today"],["tomorrow","→ Tomorrow"]].map(function(m){return '<button data-rv="'+m[0]+'" data-id="'+k.id+'">'+m[1]+'</button>';}).join("")+'</div></div>';
        }).join(""):'<div class="empty">The shelf is clear</div>')+'</div>';
      h+='<div class="modal-actions"><button class="btn primary" data-x>Done — feels lighter</button></div>';
      return h;
    }
    function wire(){
      document.querySelector("[data-x]").onclick=function(){ close(); render(); };
      document.querySelector(".modal").onclick=function(e){
        var b=e.target.closest("[data-rv]"); if(!b) return;
        var k=S.tasks.find(function(x){return x.id===b.dataset.id;}); if(!k) return;
        var m=b.dataset.rv;
        if(m==="today"){ k.day=today(); k.rollover=0; }
        else if(m==="tomorrow"){ k.day=addDays(today(),1); k.rollover=0; }
        else if(m==="someday"){ k.day=null; k.block=null; k.rollover=0; }
        else if(m==="done"){ k.status="done"; k.completedOn=today(); }
        else if(m==="drop"){ S.tasks=S.tasks.filter(function(x){return x.id!==k.id;}); }
        save(); rebuild();
      };
    }
    function rebuild(){ var m=document.querySelector(".modal"); if(m){ m.innerHTML=body(); wire(); } }
    modal(body()); wire();
  }

  /* ---------- task-time reminders (browser notifications while open) ---------- */
  var notified={};
  function checkReminders(){
    if(!S.remind || typeof Notification==="undefined" || Notification.permission!=="granted") return;
    var t=today(); var now=new Date();
    var hm=String(now.getHours()).padStart(2,"0")+":"+String(now.getMinutes()).padStart(2,"0");
    S.tasks.forEach(function(k){
      if(k.status!=="todo"||k.day!==t||!k.at||k.at!==hm) return;
      var nk=k.id+"@"+t+hm; if(notified[nk]) return; notified[nk]=1;
      try{ new Notification("Daybook — "+fmtTime(k.at),{body:k.title,tag:nk}); }catch(e){}
      toast("🔔 "+k.title);
    });
  }
  setInterval(checkReminders,20000);

  /* ---------- focus timer ---------- */
  var FT={left:0,label:"",int:null,running:false};
  function ftPaint(){
    var el=document.getElementById("focus-timer");
    if(FT.left<=0){ if(el) el.remove(); return; }
    if(!el){ el=document.createElement("div"); el.className="timer"; el.id="focus-timer"; document.body.appendChild(el);
      el.onclick=function(e){ var b=e.target.closest("[data-ft]"); if(!b)return;
        if(b.dataset.ft==="pause"){ FT.running=!FT.running; ftPaint(); }
        else if(b.dataset.ft==="plus"){ FT.left+=300; ftPaint(); }
        else ftStop(); };
    }
    var m=Math.floor(FT.left/60), s=FT.left%60;
    el.innerHTML='<div><b>'+(m<10?"0":"")+m+':'+(s<10?"0":"")+s+'</b>'+(FT.label?'<div class="t-label">'+esc(FT.label)+'</div>':'')+'</div>'+

  function icsEsc(s){ return String(s||"").replace(/\\/g,"\\\\").replace(/([,;])/g,"\\$1").replace(/\n/g,"\\n"); }
  // Build a full iCalendar. alarms=true adds VALARM reminders (used for the subscribable feed).
  function buildICS(alarms){
    var L=["BEGIN:VCALENDAR","VERSION:2.0","PRODID:-//Daybook//Pencil Me In//EN","CALSCALE:GREGORIAN","METHOD:PUBLISH","X-WR-CALNAME:Daybook","X-WR-CALDESC:Daybook tasks & deadlines"];
    var horizon=addDays(today(),-1); // keep it lean: only today-forward
    S.tasks.forEach(function(k){ if(!k.day || k.status==="done" || k.day<horizon) return;
      var timed=/^\d{2}:\d{2}$/.test(k.at||"");
      L.push("BEGIN:VEVENT","UID:task-"+k.id+"@daybook","SUMMARY:"+icsEsc(k.title));
      if(timed){ L.push("DTSTART:"+k.day.replace(/-/g,"")+"T"+k.at.replace(":","")+"00","DURATION:PT30M"); }
      else { L.push("DTSTART;VALUE=DATE:"+k.day.replace(/-/g,"")); }
      if(k.notes){ var n=htmlToText(k.notes); if(n) L.push("DESCRIPTION:"+icsEsc(n)); }
      if(alarms){ L.push("BEGIN:VALARM","ACTION:DISPLAY","DESCRIPTION:"+icsEsc(k.title),
        "TRIGGER"+(timed?":-PT30M":";RELATED=START:PT8H"),"END:VALARM"); } // timed: 30m before; all-day: 8am day-of
      L.push("END:VEVENT");
    });
    S.events.forEach(function(ev){ if(!ev.date || ev.date<horizon) return;
      L.push("BEGIN:VEVENT","UID:ev-"+ev.id+"@daybook","DTSTART;VALUE=DATE:"+ev.date.replace(/-/g,""),"SUMMARY:"+icsEsc(ev.title));
      if(alarms){ L.push("BEGIN:VALARM","ACTION:DISPLAY","DESCRIPTION:"+icsEsc(ev.title),"TRIGGER;RELATED=START:PT8H","END:VALARM"); }
      L.push("END:VEVENT");
    });
    S.jobs.forEach(function(j){ if(!j.nextDate || j.nextDate<horizon || (j.stage==="Closed")) return;
      var sum="Follow up: "+(j.company||"job")+(j.next?" — "+j.next:"");
      L.push("BEGIN:VEVENT","UID:job-"+j.id+"@daybook","DTSTART;VALUE=DATE:"+j.nextDate.replace(/-/g,""),"SUMMARY:"+icsEsc(sum));
      if(alarms){ L.push("BEGIN:VALARM","ACTION:DISPLAY","DESCRIPTION:"+icsEsc(sum),"TRIGGER;RELATED=START:PT8H","END:VALARM"); }
      L.push("END:VEVENT");
    });
    L.push("END:VCALENDAR");
    return L.join("\r\n");
  }

  /* ---------- insights ---------- */
  function insightsHtml(){
    var t=today();
    var days=[]; for(var i=13;i>=0;i--) days.push(addDays(t,-i));
    var counts=days.map(function(d){ return S.tasks.filter(function(k){return k.completedOn===d;}).length; });
    var max=Math.max.apply(null,counts.concat([1]));
    var chart='<div class="ch14">'+days.map(function(d,i){ var c=counts[i];
      return '<div class="ch14-col" title="'+niceDate(d)+' — '+c+' done"><div class="ch14-bar" style="height:'+Math.max(Math.round(100*c/max),2)+'%'+(d===t?';background:var(--terra)':'')+'"></div><span>'+DOWNAMES[dow(d)][0]+'</span></div>';
    }).join("")+'</div>';
    var wk=addDays(t,-6);
    var doneWk=S.tasks.filter(function(k){return k.completedOn&&k.completedOn>=wk;}).length;
    var addedWk=S.tasks.filter(function(k){return k.created&&k.created>=wk;}).length;
    var carried=S.tasks.filter(function(k){return k.status==="todo"&&(k.rollover||0)>=1;}).length;
    var byBlock={}; S.tasks.forEach(function(k){ if(k.completedOn&&k.completedOn>=addDays(t,-13)){ var b=k.block||"anytime"; byBlock[b]=(byBlock[b]||0)+1; } });
    var bb=Object.keys(byBlock).sort(function(a,b){return byBlock[b]-byBlock[a];})[0];
    var BLOCK_ICONS={morning:"☀️ morning",afternoon:"🌤 afternoon",evening:"🌙 evening",anytime:"⏳ anytime"};
    var tiles=[["✅ "+doneWk,"done · last 7 days"],["➕ "+addedWk,"added · last 7 days"],["⏳ "+carried,"carried right now"],["🔥 "+doneStreak(),"day streak"],[bb?BLOCK_ICONS[bb]:"—","power block · 14 days"]];
    var tl='<div class="ins-tiles">'+tiles.map(function(x){return '<div class="ins-tile"><b>'+x[0]+'</b><span>'+x[1]+'</span></div>';}).join("")+'</div>';
    var rows=S.projects.map(function(p){ var ts=S.tasks.filter(function(k){return k.projectId===p.id;}); var done=ts.filter(function(k){return k.status==="done";}).length;
      return {p:p,open:ts.length-done,done:done,total:ts.length};
    }).filter(function(r){return r.total;}).sort(function(a,b){return b.open-a.open;}).slice(0,6);

  /* ---------- @-autocomplete for add boxes ---------- */
  var acEl=null, acItems=[], acIndex=0, acInput=null, acStart=0;
  function acClose(){ if(acEl){ acEl.remove(); acEl=null; } acItems=[]; acInput=null; }
  function acCandidates(tok, projOnly){
    var lt=tok.toLowerCase().replace(/-/g," ");
    var hit=function(s){ return !lt || s.toLowerCase().indexOf(lt)===0 || s.toLowerCase().split(/\s+/).some(function(w){return w.indexOf(lt)===0;}); };
    var out=[];
    S.projects.forEach(function(p){ if(hit(p.name)) out.push({ins:"@"+p.name.replace(/\s+/g,"-"),label:esc(p.name),dot:p.color,hint:"project"}); });
    if(projOnly) return out.slice(0,8);
    [["morning","☀️ morning"],["afternoon","🌤 afternoon"],["evening","🌙 evening"]].forEach(function(b){ if(hit(b[0])) out.push({ins:"@"+b[0],label:b[1],hint:"time of day"}); });
    ["today","tomorrow","someday","anytime","tonight"].forEach(function(d2){ if(hit(d2)) out.push({ins:"@"+d2,label:d2,hint:"day"}); });
    if(lt.length>=2) ["monday","tuesday","wednesday","thursday","friday","saturday","sunday"].forEach(function(w){ if(hit(w)) out.push({ins:"@"+w,label:w,hint:"day"}); });
    ["9am","noon","1pm","3pm","5pm","7pm"].forEach(function(t2){ if(!lt||t2.indexOf(lt)===0) out.push({ins:"@"+t2,label:"🕒 "+t2,hint:"time"}); });
    if(/^\d{1,2}(:\d{2})?(a|p|am|pm)?$/.test(lt)&&out.length<8) out.unshift({ins:"@"+lt.replace(/(a|p)$/,"$1m"),label:"🕒 "+lt.replace(/(a|p)$/,"$1m"),hint:"time"});
    return out.slice(0,8);
  }
  function acRender(){
    if(acEl) acEl.remove();
    if(!acItems.length){ acEl=null; return; }
    acEl=el('<div class="ac" role="listbox">'+acItems.map(function(it,i){
      return '<div class="ac-item'+(i===acIndex?" sel":"")+'" data-i="'+i+'" role="option">'+(it.dot?'<span class="pdot" style="background:'+it.dot+'"></span>':"")+it.label+'<span class="ac-hint">'+it.hint+'</span></div>';
    }).join("")+'</div>');
    var r=acInput.getBoundingClientRect();
    acEl.style.left=Math.min(r.left,window.innerWidth-330)+"px";
    acEl.style.top=Math.min(r.bottom+4,window.innerHeight-270)+"px";
    document.body.appendChild(acEl);
    acEl.onmousedown=function(e){ var it=e.target.closest(".ac-item"); if(!it) return; e.preventDefault(); acPick(+it.dataset.i); };
  }
  function acPick(i){
    var it=acItems[i]; if(!it||!acInput) return;
    var vlong=acInput.value, caret=acInput.selectionStart;
    acInput.value=vlong.slice(0,acStart)+it.ins+" "+vlong.slice(caret);
    var pos=acStart+it.ins.length+1;
    acInput.focus(); acInput.setSelectionRange(pos,pos);
    acClose();
  }
  function acUpdate(t){
    if(t.dataset&&(t.dataset.subfor||t.dataset.fsubfor)){ acClose(); return; }
    var caret=t.selectionStart||0;
    var m=t.value.slice(0,caret).match(/@([\w:&/-]*)$/);
    if(!m){ acClose(); return; }
    acInput=t; acStart=caret-m[0].length; acIndex=0;
    acItems=acCandidates(m[1], !!(t.dataset&&t.dataset.focus));
    acRender();
  }
  document.addEventListener("input",function(e){ var t=e.target; if(t&&t.matches&&t.matches(".inline-add,#q-input,#m-title")) acUpdate(t); });
  document.addEventListener("keydown",function(e){
    if(!acEl||e.target!==acInput) return;
    if(e.key==="ArrowDown"){ e.preventDefault(); e.stopPropagation(); acIndex=(acIndex+1)%acItems.length; acRender(); }
    else if(e.key==="ArrowUp"){ e.preventDefault(); e.stopPropagation(); acIndex=(acIndex-1+acItems.length)%acItems.length; acRender(); }
    else if(e.key==="Enter"||e.key==="Tab"){ e.preventDefault(); e.stopPropagation(); acPick(acIndex); }
    else if(e.key==="Escape"){ e.preventDefault(); e.stopPropagation(); acClose(); }
  },true);
  document.addEventListener("focusout",function(e){ if(acEl&&e.target===acInput) setTimeout(function(){ if(acEl&&document.activeElement!==acInput) acClose(); },150); });

    if((e.metaKey||e.ctrlKey)&&(e.key==="k"||e.key==="K")){
      e.preventDefault();
      var mr2=document.getElementById("modal-root"); if(mr2.children.length) close();
      openPalette(); return;
    }
    var tg=e.target, tag=tg.tagName;
    if(tag==="INPUT"||tag==="TEXTAREA"||tag==="SELECT"||tg.isContentEditable) return;
    if(document.getElementById("modal-root").children.length) return;
    if((e.metaKey||e.ctrlKey)&&(e.key==="z"||e.key==="Z")){ e.preventDefault(); if(e.shiftKey) redo(); else undo(); return; }
    if((e.metaKey||e.ctrlKey)&&(e.key==="y"||e.key==="Y")){ e.preventDefault(); redo(); return; }
    if(e.metaKey||e.ctrlKey||e.altKey) return;
    if(gSeq && Date.now()-gSeq<900){
      gSeq=0;
      var map={t:"today",w:"week",b:"backlog",h:"hub",p:"projects",e:"people",c:"calendar",l:"timeline"};
      var v2=map[e.key.toLowerCase()];
      if(v2){ e.preventDefault(); view=v2; if(v2==="today") viewDay=today(); syncNav(); render(); return; }
    }
    if(e.key==="g"||e.key==="G"){ gSeq=Date.now(); return; }
    if(e.key==="/"){ e.preventDefault(); openSearchModal(); }
    else if(e.key==="n"||e.key==="N"){ e.preventDefault(); qInput.focus(); }
    else if(e.key==="?"){ e.preventDefault(); openShortcutsModal(); }
    else if(e.key==="["){ e.preventDefault(); if(window.innerWidth>1000){ S.sbOpen=!S.sbOpen; save(); applySidebarState(); } else document.body.classList.toggle("sb-open"); }
    else if(e.key==="]"){ e.preventDefault(); S.panelOpen=!S.panelOpen; save(); render(); }
  });
  document.getElementById("search-btn").onclick=openSearchModal;
  // catch the day change if the app stays open past midnight (tab or home-screen app)
  function checkDay(){ if(S.lastOpen!==today()){ viewDay=today(); onOpen(); render(); } }
  document.addEventListener("visibilitychange",function(){ if(!document.hidden) checkDay(); });
  setInterval(checkDay,60000);
  // heartbeat: keep a local snapshot and retry cloud sync if a push is still pending/failed
  setInterval(function(){ keepLocalBackups(); if(GH&&GH.gistId&&(ghDirty||ghError)) ghPush(); }, 5*60000);
  if(navigator.storage&&navigator.storage.persist){ try{ navigator.storage.persist(); }catch(e){} }
  if("serviceWorker" in navigator && (location.protocol==="https:"||location.hostname==="localhost")){ try{ navigator.serviceWorker.register("sw.js").catch(function(){}); }catch(e){} }
  idbGet("syncName",function(n){ syncName=n; updateSyncStatus(); });
  updateSyncStatus();
  idbGet("syncHandle",function(h){ if(!h||!h.queryPermission) return; syncHandle=h;
    h.queryPermission({mode:"readwrite"}).then(function(p){
      if(p==="granted") syncRead();
      else { syncReconnect=true; if(view==="today") render(); }
    }).catch(function(){});
  });
  setInterval(updateClock,1000);
  fillProjSelect();
  applySidebarState();
  applyRightbarState();
  onOpen();
  handleCaptureParams();   // quick-capture from bookmarklet / PWA share -> Backlog (sets view before first paint)
  render();
  refreshCalendars(function(){ if(view==="calendar") render(); });
  ghPull();
  document.addEventListener("visibilitychange",function(){ if(!document.hidden) ghPull(); });
  if(lockCfg()) showLock();
  if(S.welcomed===false){ S.welcomed=true; save(); openWelcomeModal(); }
})();
</script>
