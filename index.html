<meta charset="utf-8">
<title>Daybook — Pencil Me In</title>

  :root {
    --paper: #f3efe6; --sheet: #fbfaf5; --card: #ffffff;

  * { box-sizing: border-box; }
  html,body { margin:0; }
  body {
    background: var(--paper); color: var(--ink); font-family: var(--font);
    -webkit-font-smoothing: antialiased; font-size: 15px; line-height: 1.5;
  }
  /* skin scenery — a fixed illustration layer behind all content */
  body::before{
    content:""; position:fixed; inset:0; z-index:-1; pointer-events:none;
    background-image:var(--scene,none); background-repeat:no-repeat;
    background-position:center bottom; background-size:cover;
  }
  button { font-family: inherit; }
  ::selection { background: var(--terra-bg); }

  .wrap { max-width: 1120px; margin: 0 auto; padding: 0 16px 120px; }

  /* top bar */
  .appbar {
    position: sticky; top: 0; z-index: 30; background: var(--slate);
    border-radius: 0 0 18px 18px; box-shadow: 0 4px 20px -8px var(--shadow);
  }
  .appbar-inner { max-width:1120px; margin:0 auto; padding: 14px 18px 16px; display:flex; align-items:center; gap:14px; flex-wrap:wrap; }
  .brand { color: var(--slate-ink); font-weight: 800; letter-spacing:.12em; text-transform:uppercase; font-size:15px; white-space:nowrap; }
  .brand small { display:block; font-size:10.5px; letter-spacing:.18em; opacity:.7; font-weight:600; }
  .appbar .spacer { flex:1; }
  .icon-btn {
    background: rgba(255,255,255,.1); color: var(--slate-ink); border: none;
    width: 34px; height: 34px; border-radius: 10px; cursor: pointer; font-size: 15px;
    display: inline-flex; align-items:center; justify-content:center; transition: background .15s;
  }
  .icon-btn:hover { background: rgba(255,255,255,.22); }
  .icon-btn:focus-visible { outline: 2px solid var(--terra); outline-offset:2px; }

  .nav { display:flex; gap:4px; background: rgba(0,0,0,.14); padding:4px; border-radius: 12px; overflow-x:auto; }
  .nav button {
    border:none; background:transparent; color: rgba(255,255,255,.7); cursor:pointer;
    padding: 7px 15px; border-radius: 9px; font-size: 13.5px; font-weight:600; white-space:nowrap; transition: all .15s;
  }
  .nav button:hover { color:#fff; }
  .nav button[aria-current="true"] { background: var(--sheet); color: var(--slate); }

  /* quick capture */
  .capture { display:flex; gap:8px; align-items:center; margin: 18px 0 10px; flex-wrap:wrap; }
  .capture input.q {
    flex: 1 1 260px; min-width: 0; font-family:inherit; font-size:15px; color:var(--ink);
    background: var(--card); border:1.5px solid var(--line); border-radius: 12px; padding: 12px 15px;
    transition: border-color .15s;
  }
  .capture input.q:focus { outline:none; border-color: var(--terra); }
  .capture select, .capture .add {
    font-family:inherit; font-size:14px; border-radius:12px; padding:11px 13px; cursor:pointer;
    background: var(--card); color: var(--ink); border:1.5px solid var(--line);
  }
  .capture .add { background: var(--terra); color:#fff; border-color: var(--terra); font-weight:700; padding:11px 18px; }
  .capture .add:hover { background: var(--terra-deep); }

  h2.view-h { font-size: 22px; font-weight:800; margin: 4px 0 2px; letter-spacing:-.01em; }
  .sub { color: var(--ink-soft); font-size: 13.5px; margin:0 0 16px; }

  .card { background: var(--card); border:1.5px solid var(--line); border-radius: 16px; padding: 16px 18px; }
  .grid2 { display:grid; grid-template-columns: 1.3fr 1fr; gap: 18px; }
  @media (max-width: 820px){ .grid2 { grid-template-columns: 1fr; } }
  .stack { display:flex; flex-direction:column; gap:16px; }

  .label { font-size:11.5px; letter-spacing:.14em; text-transform:uppercase; color:var(--ink-soft); font-weight:700; margin:0 0 10px; }

  /* task list */
  .tasks { list-style:none; margin:0; padding:0; display:flex; flex-direction:column; }
  .task { display:flex; align-items:flex-start; gap:11px; padding:10px 4px; border-bottom:1px solid var(--line-soft); }
  .task:last-child{ border-bottom:none; }
  .chk { flex:none; width:20px; height:20px; margin-top:1px; border-radius:50%; border:1.7px solid var(--line); background:transparent; cursor:pointer; position:relative; transition: all .14s; }
  .chk:hover{ border-color: var(--terra); }
  .chk.done{ background: var(--good); border-color: var(--good); }
  .chk.done::after{ content:""; position:absolute; left:6px; top:3px; width:5px; height:9px; border:solid #fff; border-width:0 2px 2px 0; transform:rotate(42deg); }
  .task-main{ flex:1; min-width:0; }
  .task-title{ font-size:15px; word-wrap:break-word; }
  .task.done .task-title{ text-decoration:line-through; color:var(--ink-faint); }
  .task-meta{ display:flex; align-items:center; gap:7px; margin-top:4px; flex-wrap:wrap; }
  .pill{ font-size:11px; font-weight:700; padding:2px 8px; border-radius:999px; display:inline-flex; align-items:center; gap:4px; }
  .pill.proj{ color:#fff; }
  .pill.aged{ background: var(--warn-bg); color: var(--warn); }
  .pill.rec{ background: var(--terra-bg); color: var(--terra-deep); }
  .pill.block{ background: var(--line-soft); color: var(--ink-soft); }
  .task-x{ flex:none; background:transparent; border:none; color:var(--ink-faint); cursor:pointer; font-size:16px; padding:2px 4px; border-radius:6px; opacity:0; transition:opacity .15s; }
  .task:hover .task-x{ opacity:1; }
  .task-x:hover{ color: var(--terra-deep); background: var(--terra-bg); }
  .empty{ color:var(--ink-faint); font-size:13.5px; padding:14px 4px; text-align:center; }

  .block-head{ display:flex; align-items:center; gap:8px; margin:18px 0 6px; }
  .block-head .label{ margin:0; }
  .block-head .cnt{ font-size:11px; color:var(--ink-faint); }

  /* habits */
  .habit{ display:flex; align-items:center; gap:12px; padding:9px 0; border-bottom:1px solid var(--line-soft); }
  .habit:last-child{ border-bottom:none; }
  .habit .hname{ flex:1; font-size:14px; }
  .habit .streak{ font-size:11.5px; color:var(--terra-deep); font-weight:700; }
  .dots{ display:flex; gap:6px; }
  .dot{ width:16px; height:16px; border-radius:50%; border:1.6px solid var(--line); background:transparent; cursor:pointer; transition: all .12s; }
  .dot:hover{ border-color:var(--terra-deep); }
  .dot.on{ background: var(--terra); border-color: var(--terra-deep); }

  textarea.notes{ width:100%; min-height:120px; font-family:inherit; font-size:14.5px; line-height:1.6; color:var(--ink); background:transparent; border:none; resize:vertical; }
  textarea.notes:focus{ outline:none; }
  textarea.notes::placeholder{ color:var(--ink-faint); }

  /* suggestions */
  .sugg{ background: var(--terra-bg); border:1.5px solid transparent; border-radius:14px; padding:12px 14px; display:flex; gap:10px; align-items:flex-start; }
  .sugg .stxt{ flex:1; font-size:13.5px; color: var(--terra-deep); line-height:1.45; }
  .sugg .stxt b{ font-weight:800; }
  .sugg-act{ background: var(--terra); color:#fff; border:none; border-radius:9px; padding:6px 11px; font-size:12.5px; font-weight:700; cursor:pointer; white-space:nowrap; }
  .sugg-act:hover{ background: var(--terra-deep); }
  .sugg-dismiss{ background:transparent; border:none; color:var(--terra-deep); cursor:pointer; font-size:15px; opacity:.6; padding:0 2px; }
  .sugg-dismiss:hover{ opacity:1; }
  .sugg-note{ font-size:11px; color:var(--ink-faint); margin:2px 0 10px; display:flex; align-items:center; gap:5px; }

  /* projects board */
  .board{ display:grid; grid-template-columns: repeat(auto-fill, minmax(270px,1fr)); gap:16px; }
  .proj-card{ background:var(--card); border:1.5px solid var(--line); border-radius:16px; overflow:hidden; }
  .proj-top{ padding:14px 16px; color:#fff; }
  .proj-top h3{ margin:0; font-size:16px; font-weight:800; }
  .proj-top .pmeta{ font-size:12px; opacity:.9; margin-top:3px; }
  .proj-body{ padding:12px 16px 16px; }
  .mini-cols{ display:flex; flex-direction:column; gap:4px; }
  .prog{ height:7px; border-radius:999px; background:var(--line-soft); overflow:hidden; margin:8px 0 12px; }
  .prog span{ display:block; height:100%; border-radius:999px; }
  .proj-notes{ width:100%; min-height:54px; margin-top:8px; font-family:inherit; font-size:13px; color:var(--ink); background:var(--sheet); border:1px solid var(--line-soft); border-radius:10px; padding:8px 10px; resize:vertical; }
  .proj-notes:focus{ outline:none; border-color:var(--terra); }

  /* calendar */
  .cal-head{ display:flex; align-items:center; gap:12px; margin-bottom:12px; }
  .cal-head h3{ margin:0; font-size:18px; font-weight:800; min-width:180px; }
  .cal-grid{ display:grid; grid-template-columns: repeat(7,1fr); gap:6px; }
  .cal-dow{ font-size:11px; font-weight:700; color:var(--ink-soft); text-transform:uppercase; letter-spacing:.08em; text-align:center; padding:4px 0; }
  .cal-cell{ background:var(--card); border:1.5px solid var(--line); border-radius:11px; min-height:88px; padding:6px 7px; cursor:pointer; transition:border-color .12s; overflow:hidden; }
  .cal-cell:hover{ border-color: var(--terra); }
  .cal-cell.dim{ opacity:.4; }
  .cal-cell.today{ border-color: var(--terra); background: var(--terra-bg); }
  .cal-daynum{ font-size:12.5px; font-weight:700; color:var(--ink-soft); }
  .cal-cell.today .cal-daynum{ color: var(--terra-deep); }
  .cal-ev{ font-size:10.5px; margin-top:3px; padding:2px 5px; border-radius:5px; color:#fff; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .cal-ev.evt{ background: var(--slate); }
  .cal-more{ font-size:10px; color:var(--ink-faint); margin-top:2px; }

  /* timeline */
  .tl-scroll{ overflow-x:auto; padding-bottom:8px; }
  .tl{ min-width:640px; }
  .tl-months{ display:flex; border-bottom:1.5px solid var(--line); margin-bottom:6px; }
  .tl-month{ font-size:11.5px; font-weight:700; color:var(--ink-soft); padding:4px 8px; border-left:1px solid var(--line-soft); }
  .tl-row{ display:flex; align-items:center; gap:10px; padding:8px 0; border-bottom:1px solid var(--line-soft); }
  .tl-name{ width:120px; flex:none; font-size:13px; font-weight:700; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .tl-track{ position:relative; flex:1; height:26px; background:var(--line-soft); border-radius:8px; }
  .tl-bar{ position:absolute; top:3px; height:20px; border-radius:7px; color:#fff; font-size:11px; font-weight:700; padding:2px 8px; overflow:hidden; white-space:nowrap; display:flex; align-items:center; }
  .tl-today{ position:absolute; top:-4px; bottom:-4px; width:2px; background:var(--terra); }

  /* modal */
  .scrim{ position:fixed; inset:0; background:rgba(20,18,24,.5); z-index:50; display:flex; align-items:center; justify-content:center; padding:16px; }
  .modal{ background:var(--sheet); border-radius:18px; width:min(460px,100%); max-height:90vh; overflow:auto; padding:22px; box-shadow:0 30px 60px -20px rgba(0,0,0,.5); }
  .modal h3{ margin:0 0 4px; font-size:18px; font-weight:800; }
  .modal .fld{ margin:14px 0; }
  .modal label{ display:block; font-size:12px; font-weight:700; color:var(--ink-soft); text-transform:uppercase; letter-spacing:.08em; margin-bottom:6px; }
  .modal input, .modal select, .modal textarea{ width:100%; font-family:inherit; font-size:15px; color:var(--ink); background:var(--card); border:1.5px solid var(--line); border-radius:11px; padding:10px 12px; }
  .modal input:focus,.modal select:focus,.modal textarea:focus{ outline:none; border-color:var(--terra); }
  .row{ display:flex; gap:10px; }
  .row>*{ flex:1; }
  .modal-actions{ display:flex; gap:10px; justify-content:flex-end; margin-top:20px; }
  .btn{ font-family:inherit; font-size:14px; font-weight:700; border-radius:11px; padding:10px 18px; cursor:pointer; border:1.5px solid var(--line); background:var(--card); color:var(--ink); }
  .btn.primary{ background:var(--terra); border-color:var(--terra); color:#fff; }
  .btn.primary:hover{ background:var(--terra-deep); }
  .btn.ghost{ background:transparent; }
  .swatches{ display:flex; gap:8px; flex-wrap:wrap; }
  .sw{ width:30px; height:30px; border-radius:50%; cursor:pointer; border:3px solid transparent; }
  .sw[aria-pressed="true"]{ border-color:var(--ink); }
  .chips{ display:flex; gap:6px; flex-wrap:wrap; }
  .chip{ font-size:12.5px; padding:6px 11px; border-radius:999px; border:1.5px solid var(--line); background:var(--card); color:var(--ink-soft); cursor:pointer; font-weight:600; }
  .chip[aria-pressed="true"]{ background:var(--slate); color:#fff; border-color:var(--slate); }
  .wd{ display:flex; gap:5px; }
  .wd button{ width:32px; height:32px; border-radius:8px; border:1.5px solid var(--line); background:var(--card); color:var(--ink-soft); cursor:pointer; font-size:12px; font-weight:700; }
  .wd button[aria-pressed="true"]{ background:var(--terra); color:#fff; border-color:var(--terra); }

  .toast{ position:fixed; bottom:22px; left:50%; transform:translateX(-50%) translateY(20px); background:var(--slate); color:var(--slate-ink); padding:11px 18px; border-radius:12px; font-size:13.5px; font-weight:600; opacity:0; pointer-events:none; transition:all .25s; z-index:60; box-shadow:0 12px 30px -10px rgba(0,0,0,.5); }
  .toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }

  .hub-cap textarea{ width:100%; min-height:96px; font-family:inherit; font-size:15px; line-height:1.5; color:var(--ink); background:var(--sheet); border:1.5px solid var(--line); border-radius:12px; padding:12px; resize:vertical; }
  .hub-cap textarea:focus{ outline:none; border-color:var(--terra); }
  .step{ display:flex; gap:11px; align-items:flex-start; margin-top:14px; }
  .step-n{ flex:none; width:24px; height:24px; border-radius:50%; background:var(--terra); color:#fff; font-size:12px; font-weight:800; display:flex; align-items:center; justify-content:center; margin-top:2px; }
  .step b{ font-size:14.5px; }
  .jobs-cols{ display:flex; gap:12px; overflow-x:auto; padding-bottom:6px; }
  .jobs-col{ flex:0 0 210px; background:var(--sheet); border:1.5px solid var(--line); border-radius:14px; padding:10px; }
  .jobs-col h4{ margin:0 0 8px; font-size:11px; text-transform:uppercase; letter-spacing:.08em; color:var(--ink-soft); display:flex; justify-content:space-between; font-weight:700; }
  .job-card{ background:var(--card); border:1.5px solid var(--line); border-radius:11px; padding:9px 11px; margin-bottom:8px; cursor:pointer; transition:border-color .12s; }
  .job-card:hover{ border-color:var(--terra); }
  .job-card b{ font-size:14px; } .job-card .jr{ font-size:12.5px; color:var(--ink-soft); margin-top:1px; } .job-card .jn{ font-size:11.5px; color:var(--terra-deep); font-weight:600; margin-top:4px; }
  .imp-item{ display:flex; gap:10px; align-items:flex-start; padding:10px 0; border-bottom:1px solid var(--line-soft); }
  .imp-item:last-child{ border-bottom:none; }
  .imp-badge{ flex:none; font-size:11px; font-weight:700; padding:2px 9px; border-radius:999px; white-space:nowrap; }

  .pill.imp{ background:var(--warn-bg); color:var(--warn); }
  .task-main{ cursor:pointer; }
  .task-star{ flex:none; background:transparent; border:none; cursor:pointer; font-size:16px; color:var(--ink-faint); padding:2px 3px; line-height:1; }
  .task-star.on{ color:var(--warn); }
  .inline-row{ align-items:center; }
  .inline-plus{ flex:none; width:20px; text-align:center; color:var(--ink-faint); font-weight:700; font-size:16px; }
  .inline-add{ flex:1; min-width:0; border:none; background:transparent; font-family:inherit; font-size:15px; color:var(--ink); padding:4px 0; }
  .inline-add:focus{ outline:none; }
  .inline-add::placeholder{ color:var(--ink-faint); }
  .today-head{ display:flex; align-items:baseline; gap:14px; flex-wrap:wrap; }
  .clock{ font-size:14px; color:var(--ink-soft); font-weight:600; font-variant-numeric:tabular-nums; }
  .clock b{ color:var(--ink); font-weight:800; } .clock .sea{ color:var(--terra-deep); }
  details.fold{ padding:0; }
  details.fold>summary{ list-style:none; cursor:pointer; display:flex; align-items:center; gap:10px; padding:15px 18px; }
  details.fold>summary::-webkit-details-marker{ display:none; }
  details.fold[open]>summary{ padding-bottom:6px; }
  details.fold>summary .fold-label{ flex:1; font-size:11.5px; letter-spacing:.14em; text-transform:uppercase; color:var(--ink-soft); font-weight:700; }
  details.fold>summary .fold-chev{ color:var(--ink-faint); font-size:12px; transition:transform .15s; }
  details.fold[open]>summary .fold-chev{ transform:rotate(90deg); }
  .fold-body{ padding:0 18px 16px; }
  .blocks-grid{ display:grid; grid-template-columns:repeat(auto-fit,minmax(240px,1fr)); gap:16px; margin-top:16px; }
  details.hub-cap summary{ cursor:pointer; }
  details.hub-cap summary.label{ margin:0; }
  details.hub-cap[open] summary.label{ margin-bottom:10px; }

  .wk-cols{ display:grid; gap:8px; }
  .wk-col{ background:var(--card); border:1.5px solid var(--line); border-radius:12px; padding:8px; min-height:150px; cursor:pointer; transition:border-color .12s; overflow:hidden; }
  .wk-col:hover{ border-color:var(--terra); }
  .wk-col.today{ border-color:var(--terra); background:var(--terra-bg); }
  .wk-head{ font-size:12px; font-weight:700; color:var(--ink-soft); margin-bottom:6px; }
  .wk-col .cal-ev{ white-space:normal; margin-bottom:3px; }
  .yr-grid{ display:grid; grid-template-columns:repeat(auto-fill,minmax(180px,1fr)); gap:12px; }
  .yr-month{ background:var(--card); border:1.5px solid var(--line); border-radius:12px; padding:10px; }
  .yr-month h4{ margin:0 0 6px; font-size:13px; cursor:pointer; color:var(--terra-deep); }
  .yr-days{ display:grid; grid-template-columns:repeat(7,1fr); gap:2px; font-size:10px; color:var(--ink-faint); text-align:center; }
  .yr-days span{ padding:1px 0; }
  .yr-days .busy{ background:var(--terra); color:#fff; border-radius:4px; }
  .yr-days .tod{ outline:1.5px solid var(--terra-deep); border-radius:4px; color:var(--ink); }

  /* dark mode: project colors are pastel — dark text reads better than white on them */
  @media (prefers-color-scheme: dark){
    :root:not([data-theme="light"]) .pill.proj, :root:not([data-theme="light"]) .cal-ev:not(.evt),
    :root:not([data-theme="light"]) .tl-bar, :root:not([data-theme="light"]) .proj-top{ color:#1a191e; }
    :root:not([data-theme="light"]) .nav button[aria-current="true"]{ background:#141318; color:#ece9e2; }
  }
  :root[data-theme="dark"] .pill.proj, :root[data-theme="dark"] .cal-ev:not(.evt),
  :root[data-theme="dark"] .tl-bar, :root[data-theme="dark"] .proj-top{ color:#1a191e; }
  :root[data-theme="dark"] .nav button[aria-current="true"]{ background:#141318; color:#ece9e2; }

  /* motion & polish */
  html{ accent-color: var(--terra); }
  .task{ border-radius:8px; transition:background .12s; }
  .task:not(.inline-row):hover{ background:var(--line-soft); }
  .chk.done::after{ animation:pop .2s ease; }
  @keyframes pop{ 0%{ transform:rotate(42deg) scale(0); } 60%{ transform:rotate(42deg) scale(1.25); } 100%{ transform:rotate(42deg) scale(1); } }
  .dot:hover{ transform:scale(1.18); }
  .job-card{ transition:border-color .12s, transform .12s, box-shadow .12s; }
  .job-card:hover{ transform:translateY(-1px); box-shadow:0 6px 14px -8px var(--shadow); }
  .scrim{ animation:scrimIn .16s ease; backdrop-filter:blur(2.5px); }
  @keyframes scrimIn{ from{ opacity:0; } }
  .modal{ animation:modalIn .2s cubic-bezier(.2,.85,.3,1.15); }
  @keyframes modalIn{ from{ opacity:0; transform:translateY(12px) scale(.97); } }
  #view.anim{ animation:fadeup .22s ease; }
  @keyframes fadeup{ from{ opacity:0; transform:translateY(5px); } }
  details.fold[data-fold="focus"]{ border-left:4px solid var(--terra); }
  details.fold>summary:hover .fold-label{ color:var(--ink); }
  .day-prog{ height:6px; max-width:360px; border-radius:999px; background:var(--line-soft); overflow:hidden; margin:10px 0 16px; }
  .day-prog span{ display:block; height:100%; border-radius:999px; background:var(--good); transition:width .4s ease; }
  .streak-pill{ font-size:12px; font-weight:800; color:var(--terra-deep); background:var(--terra-bg); padding:3px 10px; border-radius:999px; white-space:nowrap; }
  @media (prefers-reduced-motion: reduce){ *{ animation:none !important; transition:none !important; } }

  /* search */
  .srch-row{ padding:9px 6px; border-bottom:1px solid var(--line-soft); cursor:pointer; border-radius:8px; }
  .srch-row:hover{ background: var(--terra-bg); }
  .srch-row .srch-sub{ font-size:12px; color:var(--ink-soft); margin-top:1px; }
  .srch-kind{ font-size:10.5px; font-weight:700; text-transform:uppercase; letter-spacing:.08em; color:var(--terra-deep); margin-right:7px; }

  /* drag & drop */
  .tasks.drag-over{ outline:2px dashed var(--terra); outline-offset:3px; border-radius:8px; }
  .jobs-col.drag-over{ border-color: var(--terra); }

  /* today layout — centered column + side log panel */
  .today-flex{ display:flex; gap:18px; align-items:flex-start; }
  .today-main{ flex:1 1 auto; min-width:0; max-width:800px; margin:0 auto; display:flex; flex-direction:column; gap:16px; }
  .side-panel{ flex:0 0 300px; min-width:0; position:sticky; top:74px; max-height:calc(100vh - 92px); overflow:auto; display:flex; flex-direction:column; gap:14px; }
  @media (max-width:920px){ .today-flex{ display:block; } .side-panel{ position:static; max-height:none; margin-top:16px; } }
  .day-nav{ display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
  .day-nav .icon-btn{ background:var(--slate); flex:none; }
  .panel-task{ padding:8px 0; border-bottom:1px solid var(--line-soft); }
  .panel-task:last-child{ border-bottom:none; }
  .panel-move{ display:flex; gap:4px; flex-wrap:wrap; margin-top:6px; }
  .panel-move button{ font-family:inherit; font-size:10.5px; font-weight:600; padding:2px 8px; border-radius:999px; border:1px solid var(--line); background:var(--card); color:var(--ink-soft); cursor:pointer; }
  .panel-move button:hover{ border-color:var(--terra); color:var(--terra-deep); }
  .log-day{ font-size:11px; font-weight:700; color:var(--terra-deep); text-transform:uppercase; letter-spacing:.08em; margin:10px 0 2px; cursor:pointer; }
  .log-day:hover{ text-decoration:underline; }
  .log-item{ font-size:13px; padding:4px 0 4px 4px; border-bottom:1px solid var(--line-soft); color:var(--ink-soft); }
  .log-item:last-child{ border-bottom:none; }

  /* subtasks */
  .subs{ list-style:none; margin:6px 0 0; padding:0; }
  .sub{ display:flex; gap:8px; align-items:center; padding:3px 0; }
  .sub .chk{ width:15px; height:15px; margin-top:0; }
  .sub .chk.done::after{ left:4px; top:1px; width:4px; height:7px; }
  .sub-t{ font-size:13px; color:var(--ink-soft); }
  .sub.done .sub-t{ text-decoration:line-through; color:var(--ink-faint); }
  .pill.subs-n{ background:var(--line-soft); color:var(--ink-soft); }
  .msub{ display:flex; gap:8px; align-items:center; margin-bottom:6px; }
  .msub input{ flex:1; }
  .msub .chk{ flex:none; }

  /* drag dock — drop targets that appear while dragging a task */
  .drag-dock{ position:fixed; left:50%; transform:translateX(-50%); bottom:14px; z-index:45; background:var(--sheet); border:1.5px solid var(--line); border-radius:16px; padding:10px 14px; box-shadow:0 18px 40px -12px rgba(0,0,0,.35); max-width:min(96vw,900px); }
  .dock-label{ font-size:10.5px; font-weight:700; letter-spacing:.12em; text-transform:uppercase; color:var(--ink-soft); margin-bottom:7px; }
  .dock-zones{ display:flex; gap:6px; flex-wrap:wrap; }
  .dock-zone{ font-size:12.5px; font-weight:600; padding:7px 11px; border-radius:999px; border:1.5px dashed var(--line); color:var(--ink-soft); background:var(--card); display:inline-flex; gap:6px; align-items:center; }
  .dock-zone.hot{ border-color:var(--terra); border-style:solid; color:var(--terra-deep); background:var(--terra-bg); }
  .dock-zone .pdot{ width:10px; height:10px; border-radius:50%; }

  /* timeline ticks */
  .tl-tick{ font-size:10.5px; font-weight:700; color:var(--ink-soft); padding:4px 2px 4px 4px; border-left:1px solid var(--line-soft); overflow:hidden; white-space:nowrap; }
  .tl-tick.major{ color:var(--terra-deep); border-left-color:var(--line); }

  @media print{
    .appbar,.capture,.sugg,.sugg-note,.hub-cap,.task-x,.task-star,.inline-row,.chip,.toast,.fab,button.add,#modal-root,body::before{ display:none !important; }
    body{ background:#fff; color:#000; }
    .card,details.fold,.cal-cell,.wk-col,.proj-card{ border-color:#bbb; box-shadow:none; }
    .wrap{ max-width:100%; padding:0; }
    .grid2,.blocks-grid{ display:block; }
    .card,details.fold{ margin-bottom:12px; page-break-inside:avoid; }
  }

  .fab{ display:none; }
  @media (max-width:600px){
    .grid2{ gap:14px; }
    .card{ padding:14px; }
    h2.view-h{ font-size:20px; }
    .jobs-col{ flex-basis:80vw; }
  }
</style>

<div class="appbar">
  <div class="appbar-inner">
    <div class="brand">Pencil Me In<small>daybook</small></div>
    <nav class="nav" id="nav" aria-label="Views">
      <button data-view="hub">Hub</button>

      <button data-view="projects">Projects</button>

  </div>
  <main id="view"></main>
</div>

<div id="modal-root"></div>
<div class="toast" id="toast" role="status" aria-live="polite"></div>

<script>
"use strict";
(function () {
  /* ---------- head / mobile meta injection ---------- */
  function meta(n, c, prop) { var m=document.createElement("meta"); if(prop)m.setAttribute("property",n);else m.name=n; m.content=c; document.head.appendChild(m); }
  if (!document.querySelector('meta[name="viewport"]')) meta("viewport","width=device-width, initial-scale=1, viewport-fit=cover");
  meta("apple-mobile-web-app-capable","yes");
  meta("apple-mobile-web-app-title","Daybook");
  meta("apple-mobile-web-app-status-bar-style","default");
  meta("theme-color","#565165");

  /* ---------- storage ---------- */
  var KEY = "daybook-v1";
  var PROXY_DEFAULT = "https://api.allorigins.win/raw?url=";
  var SPU_PROJECT_ID="spu-social-psych-2026";
  var SPU_PLAN_REVISION=2026071404;
  var S = load();
  var bootSavedAt = S.savedAt||0;
  function normalize(d){ d.projects=d.projects||[]; d.tasks=d.tasks||[]; d.templates=d.templates||[]; d.habits=d.habits||[]; d.habitLog=d.habitLog||{}; d.events=d.events||[]; d.phases=d.phases||[]; d.dismissed=d.dismissed||[]; d.notes=d.notes||{}; d.calSources=d.calSources||[]; if(!d.proxy)d.proxy=PROXY_DEFAULT; d.emails=d.emails||[]; d.jobs=d.jobs||[]; d.improve=d.improve||[]; if(!d.calView)d.calView="month"; if(!d.calAnchor)d.calAnchor=(d.calMonth?d.calMonth+"-01":null); if(!d.skin)d.skin="paper"; delete d.apiKey; d.people=d.people||[]; d.collapsed=d.collapsed||{}; d.lastExport=d.lastExport||null; if(typeof d.name!=="string")d.name="";
    d.focus=d.focus||{}; Object.keys(d.focus).forEach(function(k){ var v=d.focus[k]; if(typeof v==="string"){ d.focus[k]=v?[{id:uid(),text:v,done:false}]:[]; } });
    if(!d.tlView)d.tlView="months"; if(typeof d.panelOpen!=="boolean")d.panelOpen=true;
    d.tasks.forEach(function(k){ if(!Array.isArray(k.subs)) k.subs=[]; });
    return mergeSpuCoursePlan(d); }
  function load(){ try{ var d=JSON.parse(localStorage.getItem(KEY)); if(d&&d.version) return normalize(d); }catch(e){ try{ var raw=localStorage.getItem(KEY); if(raw) localStorage.setItem(KEY+"-corrupt",raw); }catch(e2){} } return seed(); }
  function save(){ S.savedAt=Date.now(); try{ localStorage.setItem(KEY, JSON.stringify(S)); }catch(e){ toast("Storage full — export a backup"); } scheduleSync(); scheduleGh(); }
  function seed(){
    return mergeSpuCoursePlan({
      version:1, lastOpen:null, theme:null,
      projects:[
        {id:uid(),name:"Personal",color:"var(--p0)",notes:""},
        {id:uid(),name:"Work",color:"var(--p1)",notes:""}
      ],
      tasks:[], templates:[], focus:{}, notes:{}, habits:[
        {id:uid(),name:"Water",goal:8},{id:uid(),name:"Fresh air",goal:1},{id:uid(),name:"Move",goal:1}
      ],
      habitLog:{}, events:[], phases:[], dismissed:[], calMonth:null,
      calSources:[], proxy:PROXY_DEFAULT,
      emails:[], jobs:[], improve:[],
      calView:"month", calAnchor:null, skin:"paper", lastExport:null, name:"",
      people:[], collapsed:{}, tlView:"months", panelOpen:true
    });
  }

  /* ---------- (course-plan seed removed in the public build) ---------- */
  function mergeSpuCoursePlan(d){ return d; }
  function uid(){ return Math.random().toString(36).slice(2,9)+Date.now().toString(36).slice(-3); }

  /* ---------- dates ---------- */
  function today(){ return fmt(new Date()); }
  function fmt(d){ return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0"); }
  function parse(s){ var p=s.split("-"); return new Date(+p[0],+p[1]-1,+p[2]); }
  function addDays(s,n){ var d=parse(s); d.setDate(d.getDate()+n); return fmt(d); }
  function diffDays(a,b){ return Math.round((parse(a)-parse(b))/864e5); }
  function dow(s){ return parse(s).getDay(); }
  var DOWNAMES=["Sun","Mon","Tue","Wed","Thu","Fri","Sat"];
  var MONTHS=["January","February","March","April","May","June","July","August","September","October","November","December"];
  function niceDate(s){ var d=parse(s); return DOWNAMES[d.getDay()]+", "+MONTHS[d.getMonth()]+" "+d.getDate(); }
  var WDFULL=["Sunday","Monday","Tuesday","Wednesday","Thursday","Friday","Saturday"];
  function ordinal(n){ var s=["th","st","nd","rd"], v=n%100; return n+(s[(v-20)%10]||s[v]||s[0]); }
  function fullDate(s){ var d=parse(s); return WDFULL[d.getDay()]+", "+MONTHS[d.getMonth()]+" "+ordinal(d.getDate())+", "+d.getFullYear(); }
  function clockHtml(){ var now=new Date(); var loc=now.toLocaleTimeString([],{hour:"numeric",minute:"2-digit"}); var sea=now.toLocaleTimeString("en-US",{hour:"numeric",minute:"2-digit",timeZone:"America/Los_Angeles"}); return '<b>'+loc+'</b> your time <span style="opacity:.45">·</span> <span class="sea">'+sea+' Seattle</span>'; }
  function updateClock(){ var el=document.getElementById("clock"); if(el) el.innerHTML=clockHtml(); }
  function fold(key,label,body,action){ var open=S.collapsed[key]?"":" open"; return '<details class="card fold" data-fold="'+key+'"'+open+'><summary><span class="fold-label">'+label+'</span>'+(action||"")+'<span class="fold-chev">▸</span></summary><div class="fold-body">'+body+'</div></details>'; }

  /* ---------- theme ---------- */
  function applyTheme(){ if(S.theme) document.documentElement.setAttribute("data-theme",S.theme); else document.documentElement.removeAttribute("data-theme");
    if(S.skin&&S.skin!=="paper") document.documentElement.setAttribute("data-skin",S.skin); else document.documentElement.removeAttribute("data-skin"); }
  document.getElementById("theme-btn").onclick=function(){
    var cur=S.theme|| (matchMedia("(prefers-color-scheme: dark)").matches?"dark":"light");
    S.theme = cur==="dark"?"light":"dark"; applyTheme(); save();
  };
  applyTheme();

  /* ---------- rollover + recurrence on open ---------- */
  function onOpen(){
    var t=today();
    if(S.lastOpen!==t){
      // roll unfinished dated tasks forward to today
      S.tasks.forEach(function(k){
        if(k.status==="todo" && k.day && k.day<t){ k.rollover=(k.rollover||0)+diffDays(t,k.day); k.day=t; }
      });
      generateRecurring(t);
      S.lastOpen=t; save();
    } else { generateRecurring(t); }
  }
  function generateRecurring(day){
    S.templates.forEach(function(tp){
      if(tp.paused) return;
      if((tp.skip||[]).indexOf(day)>=0) return;
      if(!ruleHits(tp,day)) return;
      var exists=S.tasks.some(function(k){ return k.tplId===tp.id && k.day===day; });
      if(!exists){
        S.tasks.push({id:uid(),title:tp.title,projectId:tp.projectId,status:"todo",day:day,
          block:tp.block||null,priority:!!tp.priority,rollover:0,tplId:tp.id,created:day});
      }
    });
    save();
  }
  function ruleHits(tp,day){
    if(tp.start && day<tp.start) return false;
    if(tp.freq==="daily") return true;
    if(tp.freq==="weekly") return (tp.weekdays||[]).indexOf(dow(day))>=0;
    if(tp.freq==="everyN"){ var base=tp.start||day; return diffDays(day,base)%(tp.interval||2)===0; }
    return false;
  }

  /* ---------- helpers ---------- */
  function proj(id){ return S.projects.find(function(p){return p.id===id;}); }
  function projColor(id){ var p=proj(id); return p?p.color:"var(--ink-faint)"; }
  function esc(s){ return (s||"").replace(/[&<>"]/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c];}); }
  function el(html){ var d=document.createElement("div"); d.innerHTML=html.trim(); return d.firstChild; }
  function toast(msg){ var t=document.getElementById("toast"); t.textContent=msg; t.classList.add("show"); clearTimeout(t._h); t._h=setTimeout(function(){t.classList.remove("show");},2200); }
  function toastUndo(msg, fn){ var t=document.getElementById("toast"); t.textContent=msg+" "; var b=document.createElement("button"); b.textContent="Undo"; b.style.cssText="margin-left:8px;background:transparent;border:none;color:var(--terra);font-weight:800;cursor:pointer;font-family:inherit;font-size:13.5px"; b.onclick=function(){ fn(); t.classList.remove("show"); }; t.appendChild(b); t.classList.add("show"); clearTimeout(t._h); t._h=setTimeout(function(){t.classList.remove("show");},5500); }

  /* ---------- router ---------- */
  var view="today";
  var viewDay=today();
  var pendingFocus=null;
  var dragTaskId=null, dragJobId=null;
  var lastRenderedView=null;
  var IN_CLAUDE=(function(){ try{ return window.self!==window.top || /claude|anthropic|usercontent/i.test(location.hostname); }catch(e){ return true; } })();
  var nav=document.getElementById("nav");
  nav.onclick=function(e){ var b=e.target.closest("button"); if(!b)return; view=b.dataset.view;
    [].forEach.call(nav.children,function(c){c.setAttribute("aria-current",c===b?"true":"false");}); render(); };
  function render(){
    var m=document.getElementById("view");
    if(view==="today") m.innerHTML=viewToday();
    else if(view==="projects") m.innerHTML=viewProjects();
    else if(view==="calendar") m.innerHTML=viewCalendar();
    else if(view==="timeline") m.innerHTML=viewTimeline();
    else if(view==="hub") m.innerHTML=viewHub();
    else if(view==="people") m.innerHTML=viewPeople();
    bind();
    if(lastRenderedView!==view){ m.classList.remove("anim"); void m.offsetWidth; m.classList.add("anim"); lastRenderedView=view; }
  }

  /* ---------- TODAY ---------- */
  function impFirst(arr){ return arr.slice().sort(function(a,b){ return (b.priority?1:0)-(a.priority?1:0); }); }
  function taskLi(k){
    var p=proj(k.projectId);
    var pills="";
    if(k.priority) pills+='<span class="pill imp">★ important</span>';
    if(p) pills+='<span class="pill proj" style="background:'+p.color+'">'+esc(p.name)+'</span>';
    if(k.tplId) pills+='<span class="pill rec">↻ repeats</span>';
    if(k.rollover>=1) pills+='<span class="pill aged">carried '+k.rollover+'d</span>';
    if(k.dueLabel) pills+='<span class="pill block">'+esc(k.dueLabel)+'</span>';
    if(k.block) pills+='<span class="pill block">'+k.block+'</span>';
    var subsHtml="";
    if(k.subs&&k.subs.length){
      var sdn=k.subs.filter(function(s){return s.done;}).length;
      pills+='<span class="pill subs-n">☑ '+sdn+'/'+k.subs.length+'</span>';
      subsHtml='<ul class="subs">'+k.subs.map(function(s){return '<li class="sub '+(s.done?"done":"")+'"><button class="chk '+(s.done?"done":"")+'" data-act="sub-toggle" data-sid="'+s.id+'" aria-label="Toggle subtask" aria-pressed="'+!!s.done+'"></button><span class="sub-t">'+esc(s.text)+'</span></li>';}).join("")+'</ul>';
    }
    return '<li class="task '+(k.status==="done"?"done":"")+'" data-id="'+k.id+'" draggable="true">'+
      '<button class="chk '+(k.status==="done"?"done":"")+'" data-act="toggle" aria-label="Toggle done" aria-pressed="'+(k.status==="done")+'"></button>'+
      '<div class="task-main" data-act="edit" title="Tap to edit"><div class="task-title">'+esc(k.title)+'</div>'+
      (pills?'<div class="task-meta">'+pills+'</div>':'')+subsHtml+'</div>'+
      '<button class="task-star '+(k.priority?"on":"")+'" data-act="star" aria-label="Toggle important" aria-pressed="'+!!k.priority+'">'+(k.priority?"★":"☆")+'</button>'+
      '<button class="task-x" data-act="del" aria-label="Delete">✕</button></li>';
  }
  function inlineAddRow(key,label){
    return '<li class="task inline-row"><span class="inline-plus">+</span><input class="inline-add" data-block="'+key+'" placeholder="'+label+'" aria-label="'+label+'"/></li>';
  }
  function inlineAddRowFocus(label){
    return '<li class="task inline-row"><span class="inline-plus">+</span><input class="inline-add" data-focus="1" placeholder="'+label+'" aria-label="'+label+'"/></li>';
  }
  function focusRow(f){
    var p=f.projectId?proj(f.projectId):null;
    return '<li class="task '+(f.done?"done":"")+'" data-id="'+f.id+'">'+
      '<button class="chk '+(f.done?"done":"")+'" data-act="focus-toggle" aria-label="Toggle done" aria-pressed="'+!!f.done+'"></button>'+
      '<div class="task-main" data-act="focus-edit" title="Tap to edit"><div class="task-title">'+esc(f.text)+'</div>'+
      (p?'<div class="task-meta"><span class="pill proj" style="background:'+p.color+'">'+esc(p.name)+'</span></div>':"")+'</div>'+
      '<button class="task-x" data-act="focus-del" aria-label="Delete">✕</button></li>';
  }
  function addFocusItem(val){
    val=(val||"").trim(); if(!val) return;
    var at=parseAtTokens(val);
    S.focus[viewDay]=S.focus[viewDay]||[];
    S.focus[viewDay].push({id:uid(),text:at.title||val,projectId:at.projectId||null,done:false});
    pendingFocus="focus"; save(); render();
  }
  function viewToday(){
    var t=today(), vd=viewDay;
    var isToday=vd===t, isPast=vd<t;
    var focusItems=S.focus[vd]||[];
    var open=S.tasks.filter(function(k){return k.day===vd && k.status!=="done";});
    var doneV=S.tasks.filter(function(k){return k.status==="done" && k.completedOn===vd;});
    var blocks=["morning","afternoon","evening"];
    var sugg=isToday?computeSuggestions():[];
    var doneCount=doneV.length, total=open.length+doneCount;

    var hr=new Date().getHours();
    var greet=(hr<12?"Good morning":(hr<17?"Good afternoon":"Good evening"))+(S.name?", "+esc(S.name):"");
    var streak=doneStreak();
    var status;
    if(isToday) status = greet+". "+(!total ? "A blank page — add your first task below."
      : (open.length===0 ? "All "+total+" done. Beautifully clear. ✨" : doneCount+" of "+total+" done today."));
    else if(isPast) status = "Looking back. "+(doneCount ? doneCount+" thing"+(doneCount===1?"":"s")+" completed this day." : "Nothing was completed this day.")+(open.length?" "+open.length+" still open.":"");
    else status = "Planning ahead. "+(open.length ? open.length+" task"+(open.length===1?"":"s")+" lined up for this day." : "Nothing planned yet — add tasks below.");
    var html='<div class="today-head day-nav">'+
      '<button class="icon-btn" data-act="daynav" data-d="-1" aria-label="Previous day" title="Previous day">‹</button>'+
      '<h2 class="view-h">'+fullDate(vd)+'</h2>'+
      '<button class="icon-btn" data-act="daynav" data-d="1" aria-label="Next day" title="Next day">›</button>'+
      (isToday?'':'<button class="chip" data-act="daynav" data-d="0">Back to today</button>')+
      (isToday?'<div class="clock" id="clock">'+clockHtml()+'</div>':'')+
      (isToday&&streak>=2?'<span class="streak-pill" title="Days in a row with at least one task done">🔥 '+streak+'-day streak</span>':"")+
      '<button class="chip" style="margin-left:auto" data-act="panel-toggle" aria-pressed="'+!!S.panelOpen+'">📋 '+(S.panelOpen?"Hide":"Show")+' log'+(doneCount?' · '+doneCount+' done':'')+'</button>'+
      '</div>'+
      '<p class="sub"'+(total?' style="margin-bottom:0"':'')+'>'+status+'</p>'+
      (total?'<div class="day-prog" aria-hidden="true"><span style="width:'+Math.round(100*doneCount/total)+'%"></span></div>':"");

    html+='<div class="today-flex"><div class="today-main">';
    if(isToday) html+=spuCourseDashboardHtml();

    if(sugg.length){
      html+='<div class="stack">';
      html+='<div class="sugg-note">✨ Smart, not psychic — suggestions from your own patterns</div>';
      sugg.forEach(function(s){
        html+='<div class="sugg" data-sid="'+esc(s.id)+'"><div class="stxt">'+s.text+'</div>'+
          (s.action?'<button class="sugg-act" data-act="sugg" data-sid="'+esc(s.id)+'">'+s.action+'</button>':'')+
          '<button class="sugg-dismiss" data-act="sugg-x" data-sid="'+esc(s.id)+'" aria-label="Dismiss">✕</button></div>';
      });
      html+='</div>';
    }

    if(isToday) html+=captureCardHtml(true);
    html+=fold("focus",(isToday?"Today\'s focus":"Focus — "+niceDate(vd)),'<ul class="tasks">'+focusItems.map(focusRow).join("")+inlineAddRowFocus("What matters most "+(isToday?"today":"that day")+"…")+'</ul>');
    var master=impFirst(open);
    html+=fold("tasks","Tasks"+(open.length?" · "+open.length:""),'<ul class="tasks" data-list="master">'+master.map(taskLi).join("")+inlineAddRow("master","Add a task — try @project @morning, or “tomorrow”…")+'</ul>');
    // time blocks — side by side on wide screens
    html+='<div class="blocks-grid" style="margin-top:0">';
    blocks.forEach(function(b){
      var items=impFirst(open.filter(function(k){return k.block===b;}));
      var body='<ul class="tasks" data-list="'+b+'">'+items.map(taskLi).join("")+inlineAddRow(b,"Add to "+b+"…")+'</ul>';
      var action='<button class="chip" style="padding:3px 9px" data-act="addblock" data-block="'+b+'">+ options</button>';
      var BLOCK_ICONS={morning:"☀️",afternoon:"🌤",evening:"🌙"};
      html+=fold("block-"+b, BLOCK_ICONS[b]+" "+b.charAt(0).toUpperCase()+b.slice(1), body, action);
    });
    html+='</div>';
    var anytime=impFirst(open.filter(function(k){return !k.block;}));
    html+=fold("anytime","⏳ Anytime"+(anytime.length?" · "+anytime.length:""),'<ul class="tasks" data-list="loose">'+anytime.map(taskLi).join("")+inlineAddRow("loose","Add for anytime — no set time…")+'</ul>');
    var someday=S.tasks.filter(function(k){return !k.day && k.status!=="done";});
    html+=fold("someday","💭 Someday",'<ul class="tasks" data-list="someday">'+someday.map(taskLi).join("")+inlineAddRow("someday","Add for later — no date…")+'</ul>');
    var hb='';
    S.habits.forEach(function(h){
      var log=(S.habitLog[vd]||{})[h.id]||0; var st=habitStreak(h.id);
      hb+='<div class="habit"><span class="hname" data-act="edithabit" data-hid="'+h.id+'" style="cursor:pointer" title="Tap to edit">'+esc(h.name)+'</span>'+
        (st>1?'<span class="streak">🔥 '+st+'</span>':'')+
        '<div class="dots" data-hid="'+h.id+'">';
      for(var i=0;i<h.goal;i++) hb+='<button class="dot '+(i<log?"on":"")+'" data-i="'+(i+1)+'" aria-label="'+esc(h.name)+' '+(i+1)+'" aria-pressed="'+(i<log)+'"></button>';
      hb+='</div></div>';
    });
    hb+='<button class="chip" data-act="addhabit" style="margin-top:10px">+ habit</button>';
    html+='<div class="grid2">'+
      fold("habits","Habits &amp; wellness",hb)+
      fold("notes","Notes",'<textarea class="notes" id="notes-area" placeholder="Jot anything — ideas, blockers, wins…">'+esc(S.notes[vd]||"")+'</textarea>')+
      '</div>';
    html+='</div>'; // today-main
    if(S.panelOpen) html+=sidePanelHtml(vd);
    html+='</div>'; // today-flex
    return html;
  }

  /* completed + carried log — the hideable side panel */
  function sidePanelHtml(vd){
    var carried=S.tasks.filter(function(k){return k.status==="todo" && (k.rollover||0)>=1;});
    var doneV=S.tasks.filter(function(k){return k.status==="done" && k.completedOn===vd;});
    var MOVES=[["morning","☀️ Morning"],["afternoon","🌤 Afternoon"],["evening","🌙 Evening"],["anytime","⏳ Anytime"],["someday","💭 Someday"]];
    var cb=carried.length?carried.map(function(k){
      var p=proj(k.projectId);
      return '<div class="panel-task" data-id="'+k.id+'"><div class="task-main" data-act="edit" title="Tap to edit"><div class="task-title" style="font-size:13.5px">'+esc(k.title)+'</div>'+
        '<div class="task-meta"><span class="pill aged">carried '+k.rollover+'d</span>'+(p?'<span class="pill proj" style="background:'+p.color+'">'+esc(p.name)+'</span>':"")+'</div></div>'+
        '<div class="panel-move">'+MOVES.map(function(m){return '<button data-act="panel-move" data-to="'+m[0]+'" data-id="'+k.id+'">'+m[1]+'</button>';}).join("")+'</div></div>';
    }).join(""):'<div class="empty">Nothing carried over 🎉</div>';
    var db=doneV.length?'<ul class="tasks">'+doneV.map(taskLi).join("")+'</ul>':'<div class="empty">Nothing completed '+(vd===today()?"yet":"this day")+'</div>';
    var byDay={};
    S.tasks.forEach(function(k){ if(k.status==="done"&&k.completedOn){ (byDay[k.completedOn]=byDay[k.completedOn]||[]).push(k); } });
    var daysK=Object.keys(byDay).sort().reverse().slice(0,21);
    var lb=daysK.length?daysK.map(function(d){
      return '<div class="log-day" data-act="panel-goday" data-d="'+d+'" title="View this day">'+niceDate(d)+' · '+byDay[d].length+'</div>'+
        byDay[d].map(function(k){return '<div class="log-item">✓ '+esc(k.title)+'</div>';}).join("");
    }).join(""):'<div class="empty">No completed tasks yet</div>';
    return '<aside class="side-panel">'+
      fold("panel-carried","⏳ Carried over"+(carried.length?" · "+carried.length:""),cb)+
      fold("panel-done","✓ Completed"+(doneV.length?" · "+doneV.length:""),db)+
      fold("panel-log","🗂 Completed log",lb)+
      '</aside>';
  }

  /* ---------- suggestions engine (local, explainable) ---------- */
  function norm(s){ return (s||"").trim().toLowerCase(); }
  function computeSuggestions(){
    var t=today(), out=[], d=S.dismissed;
    // 1. aged tasks
    S.tasks.filter(function(k){return k.status==="todo"&&k.day===t&&(k.rollover||0)>=3;}).slice(0,1).forEach(function(k){
      var id="aged-"+k.id; if(d.indexOf(id)<0) out.push({id:id,text:'<b>“'+esc(k.title)+'”</b> has carried '+k.rollover+' days. Break it into a smaller next step, or let it go?'});
    });
    // 2. frequently completed titles not present today
    var freq={};
    S.tasks.filter(function(k){return k.status==="done";}).forEach(function(k){ var n=norm(k.title); if(n) freq[n]=(freq[n]||0)+1; });
    var todayTitles=S.tasks.filter(function(k){return k.day===t;}).map(function(k){return norm(k.title);});
    Object.keys(freq).filter(function(n){return freq[n]>=3 && todayTitles.indexOf(n)<0;})
      .sort(function(a,b){return freq[b]-freq[a];}).slice(0,1).forEach(function(n){
        var id="rep-"+n; if(d.indexOf(id)<0){
          var ex=S.tasks.find(function(k){return norm(k.title)===n;});
          out.push({id:id,text:'You\'ve done <b>“'+esc(ex.title)+'”</b> '+freq[n]+' times. Make it a task for today?',action:"Add",data:{title:ex.title,projectId:ex.projectId}});
        }
      });
    // 3. quiet projects
    S.projects.forEach(function(p){
      var last=null;
      S.tasks.forEach(function(k){ if(k.projectId===p.id){ var dd=k.completedOn||k.day||k.created; if(dd&&(!last||dd>last)) last=dd; }});
      if(last && diffDays(t,last)>=7){ var id="quiet-"+p.id; if(d.indexOf(id)<0) out.push({id:id,text:'<b>'+esc(p.name)+'</b> has been quiet for '+diffDays(t,last)+' days. Anything to move forward?'}); }
    });
    // 4. weekday pattern
    var wd=dow(t), wdmap={};
    S.tasks.filter(function(k){return k.status==="done"&&k.completedOn;}).forEach(function(k){
      if(dow(k.completedOn)===wd){ var n=norm(k.title); if(n) wdmap[n]=(wdmap[n]||0)+1; }
    });
    Object.keys(wdmap).filter(function(n){return wdmap[n]>=2 && todayTitles.indexOf(n)<0;}).slice(0,1).forEach(function(n){
      var id="wd-"+wd+"-"+n; if(d.indexOf(id)<0){ var ex=S.tasks.find(function(k){return norm(k.title)===n;});
        out.push({id:id,text:'You usually do <b>“'+esc(ex.title)+'”</b> on '+DOWNAMES[wd]+'s.',action:"Add",data:{title:ex.title,projectId:ex.projectId}}); }
    });
    // 5. sync file needs a permission tap after browser restart
    if(syncReconnect && d.indexOf("sync-reconnect")<0) out.push({id:"sync-reconnect",text:'Your <b>sync file</b> needs a quick permission tap after the browser restarted.',action:"Reconnect",act:"sync"});
    // 6. backup reminder — only when no sync is safeguarding the data
    var synced = (GH&&GH.gistId) || syncHandle;
    var stale = S.lastExport ? diffDays(t,S.lastExport)>=30 : S.tasks.length>=15;
    if(stale && !synced){ var bid="backup-"+t.slice(0,7); if(d.indexOf(bid)<0) out.push({id:bid,text:'Your work saves in this browser automatically, but only here. Turn on <b>☁️ Cloud sync</b> (⋯ menu) or <b>export a backup</b> so a cleared browser or lost device can\'t take it with it.'+(S.lastExport?' Last backup: '+diffDays(t,S.lastExport)+' days ago.':''),action:"Export",act:"export"}); }
    return out.slice(0,4);
  }
  function doneStreak(){
    var days={}; S.tasks.forEach(function(k){ if(k.completedOn) days[k.completedOn]=1; });
    var s=0, d=today(); if(!days[d]) d=addDays(d,-1);
    while(days[d]){ s++; d=addDays(d,-1); }
    return s;
  }
  function habitStreak(hid){
    var s=0, d=today();
    for(var i=0;i<400;i++){ var day=addDays(d,-i); var v=(S.habitLog[day]||{})[hid]||0; var h=S.habits.find(function(x){return x.id===hid;});
      if(h && v>=h.goal) s++; else { if(i===0) continue; break; } }
    return s;
  }

  /* ---------- CALENDAR ---------- */
  function calAnchorDate(){ return S.calAnchor||today(); }
  function dayItems(ds){
    var items=[];
    S.tasks.forEach(function(k){ if(k.day===ds) items.push({t:k.title,c:projColor(k.projectId),done:k.status==="done",imp:!!k.priority}); });
    S.events.forEach(function(ev){ if(ev.date!==ds||!sourceEnabled(ev)) return; var c=ev.color||(ev.projectId?projColor(ev.projectId):null); items.push({t:ev.title,c:c,evt:!c}); });
    return items;
  }
  function spanDays(cv,a){
    var st,n;
    if(cv==="3day"){ st=a; n=3; }
    else if(cv==="workweek"){ var w=dow(a); st=addDays(a,(w===0?-6:1-w)); n=5; }
    else { st=addDays(a,-dow(a)); n=7; }
    var out=[]; for(var i=0;i<n;i++) out.push(addDays(st,i));
    return out;
  }
  function calTitle(cv,a){
    if(cv==="month") return MONTHS[+a.slice(5,7)-1]+" "+a.slice(0,4);
    if(cv==="year") return a.slice(0,4);
    var days=spanDays(cv,a); var s=parse(days[0]), e=parse(days[days.length-1]);
    return MONTHS[s.getMonth()].slice(0,3)+" "+s.getDate()+" – "+(e.getMonth()!==s.getMonth()?MONTHS[e.getMonth()].slice(0,3)+" ":"")+e.getDate()+", "+e.getFullYear();
  }

  function monthGridHtml(a){
    var y=+a.slice(0,4), mo=+a.slice(5,7)-1;
    var startPad=new Date(y,mo,1).getDay();
    var daysIn=new Date(y,mo+1,0).getDate();
    var t=today();
    var html='<div class="cal-grid">'+DOWNAMES.map(function(d){return '<div class="cal-dow">'+d+'</div>';}).join("");
    for(var i=0;i<startPad;i++) html+='<div class="cal-cell dim"></div>';
    for(var day=1;day<=daysIn;day++){
      var ds=y+"-"+String(mo+1).padStart(2,"0")+"-"+String(day).padStart(2,"0");
      var items=dayItems(ds).filter(function(it){return !it.done;});
      var cells="";
      items.slice(0,3).forEach(function(it){ cells+='<div class="cal-ev '+(it.evt?"evt":"")+'" style="'+(it.c&&!it.evt?"background:"+it.c:"")+'">'+(it.imp?"★ ":"")+esc(it.t)+'</div>'; });
      if(items.length>3) cells+='<div class="cal-more">+'+(items.length-3)+' more</div>';
      html+='<div class="cal-cell '+(ds===t?"today":"")+'" data-act="calday" data-d="'+ds+'"><div class="cal-daynum">'+day+'</div>'+cells+'</div>';
    }
    return html+'</div>';
  }
  function weekGridHtml(cv,a){
    var days=spanDays(cv,a); var t=today();
    var html='<div class="wk-cols" style="grid-template-columns:repeat('+days.length+',1fr)">';
    days.forEach(function(ds){
      var d=parse(ds); var items=dayItems(ds);
      html+='<div class="wk-col '+(ds===t?"today":"")+'" data-act="calday" data-d="'+ds+'">'+
        '<div class="wk-head">'+DOWNAMES[d.getDay()]+' <b>'+d.getDate()+'</b></div>';
      items.forEach(function(it){ html+='<div class="cal-ev '+(it.evt?"evt":"")+'" style="'+(it.c&&!it.evt?"background:"+it.c:"")+(it.done?";opacity:.45;text-decoration:line-through":"")+'">'+(it.imp?"★ ":"")+esc(it.t)+'</div>'; });
      if(!items.length) html+='<div class="empty" style="padding:8px 0">—</div>';
      html+='</div>';
    });
    return html+'</div>';
  }
  function yearGridHtml(y){
    var busy={};
    S.tasks.forEach(function(k){ if(k.day&&k.day.slice(0,4)===String(y)) busy[k.day]=1; });
    S.events.forEach(function(e){ if(e.date&&e.date.slice(0,4)===String(y)&&sourceEnabled(e)) busy[e.date]=1; });
    var t=today();
    var html='<div class="yr-grid">';
    for(var m=0;m<12;m++){
      var daysIn=new Date(y,m+1,0).getDate(); var pad=new Date(y,m,1).getDay();
      var mm=String(m+1).padStart(2,"0");
      html+='<div class="yr-month"><h4 data-act="goMonth" data-m="'+y+'-'+mm+'" title="Open month">'+MONTHS[m]+'</h4><div class="yr-days">';
      for(var i=0;i<pad;i++) html+='<span></span>';
      for(var d2=1;d2<=daysIn;d2++){ var ds=y+"-"+mm+"-"+String(d2).padStart(2,"0");
        html+='<span class="'+(busy[ds]?"busy":"")+(ds===t?" tod":"")+'">'+d2+'</span>'; }
      html+='</div></div>';
    }
    return html+'</div>';

  /* ---------- TIMELINE ---------- */
  function viewTimeline(){
    var tv=S.tlView||"months";
    var html='<h2 class="view-h">Timeline</h2><p class="sub">Long-term view — each bar is a project phase. Add phases from the Projects tab.</p>';
    html+='<div class="chips" style="margin-bottom:14px">'+[["months","Months"],["weeks","Weeks"],["days","Days"]].map(function(v){return '<button class="chip" data-act="tlview" data-v="'+v[0]+'" aria-pressed="'+(tv===v[0])+'">'+v[1]+'</button>';}).join("")+'</div>';
    if(!S.phases.length){ html+='<div class="card empty" style="padding:40px">No phases yet. Go to <b>Projects</b> → “+ phase” to map out project stages across weeks.</div>'; return html; }
    var starts=S.phases.map(function(p){return p.start;}).concat([today()]);
    var ends=S.phases.map(function(p){return p.end;}).concat([today()]);
    var min=starts.sort()[0], max=ends.sort()[ends.length-1];
    min=addDays(min,-3); max=addDays(max,3);
    var span=Math.max(diffDays(max,min)+1,14);
    var PPD={months:6,weeks:18,days:34}[tv]||6;
    var trackW=span*PPD;
    // scale ticks — real dates, sized to the zoom level
    var ticks=[];
    if(tv==="months"){
      var d=parse(min), seen=[];
      while(fmt(d)<=max){ var mk=fmt(d).slice(0,7); if(seen.indexOf(mk)<0){ seen.push(mk); ticks.push({label:MONTHS[+mk.slice(5,7)-1].slice(0,3)+" "+mk.slice(0,4),w:daysInMonthClamped(mk,min,max)*PPD,major:true}); } d.setDate(d.getDate()+1); }
    } else if(tv==="weeks"){
      var ws=addDays(min,-dow(min)), lastM=null;
      while(ws<=max){
        var s=ws<min?min:ws, e=addDays(ws,6)>max?max:addDays(ws,6);
        var sd2=parse(s), mlbl=MONTHS[sd2.getMonth()].slice(0,3);
        ticks.push({label:mlbl+" "+sd2.getDate(),w:(diffDays(e,s)+1)*PPD,major:mlbl!==lastM});
        lastM=mlbl; ws=addDays(ws,7);
      }
    } else {
      var dd=min;
      while(dd<=max){ var dn=+dd.slice(8);
        ticks.push({label:dn===1?MONTHS[+dd.slice(5,7)-1].slice(0,3)+" 1":String(dn),w:PPD,major:dn===1||dow(dd)===0});
        dd=addDays(dd,1); }
    }
    html+='<div class="tl-scroll"><div class="tl" style="min-width:'+(trackW+134)+'px">';
    html+='<div class="tl-months" style="margin-left:130px;width:'+trackW+'px">'+
      ticks.map(function(tk){return '<div class="tl-tick'+(tk.major?" major":"")+'" style="flex:0 0 '+tk.w+'px">'+tk.label+'</div>';}).join("")+'</div>';
    // rows by project
    var todayLeft=(today()>=min&&today()<=max)?diffDays(today(),min)*PPD:null;
    S.projects.forEach(function(p){
      var phs=S.phases.filter(function(x){return x.projectId===p.id;});
      if(!phs.length) return;
      phs.forEach(function(ph){
        var left=diffDays(ph.start,min)*PPD, width=Math.max((diffDays(ph.end,ph.start)+1)*PPD,18);
        html+='<div class="tl-row"><div class="tl-name" title="'+esc(p.name)+'">'+esc(p.name)+'</div>'+
          '<div class="tl-track" style="flex:0 0 '+trackW+'px">'+(todayLeft!==null?'<div class="tl-today" style="left:'+todayLeft+'px"></div>':"")+
          '<div class="tl-bar" style="left:'+left+'px;width:'+width+'px;background:'+p.color+'" data-act="delphase" data-id="'+ph.id+'" title="'+esc(ph.title)+' · '+niceDate(ph.start)+' → '+niceDate(ph.end)+' — click to remove">'+esc(ph.title)+'</div></div></div>';
      });
    });
    html+='</div></div>';
    return html;
  }
  function daysInMonthClamped(mk,min,max){
    var y=+mk.slice(0,4),m=+mk.slice(5,7)-1;
    var s=mk+"-01", e=fmt(new Date(y,m+1,0));
    if(s<min)s=min; if(e>max)e=max;
    return Math.max(diffDays(e,s)+1,0);
  }

  /* ---------- event binding ---------- */
  function bind(){
    var v=document.getElementById("view");
    bindCapture();
    if(view==="hub") bindHub();
    v.onkeydown=function(e){ if(e.key==="Enter" && e.target.classList && e.target.classList.contains("inline-add")){ e.preventDefault();
      if(e.target.dataset.focus){ addFocusItem(e.target.value); } else { addTaskInline(e.target.value, e.target.dataset.block); } } };
    if(pendingFocus){ var pf=pendingFocus==="focus" ? v.querySelector('.inline-add[data-focus="1"]') : v.querySelector('.inline-add[data-block="'+pendingFocus+'"]'); pendingFocus=null; if(pf){ pf.focus(); } }
    v.querySelectorAll("details.fold").forEach(function(d){ d.addEventListener("toggle",function(){ S.collapsed[d.dataset.fold]=!d.open; save(); }); });
    updateClock();
    var na=document.getElementById("notes-area");
    if(na) na.oninput=function(){ S.notes[viewDay]=na.value; save(); };
    // project notes
    v.querySelectorAll(".proj-notes").forEach(function(ta){ ta.oninput=function(){ var p=proj(ta.dataset.pid); if(p){p.notes=ta.value; save();} }; });
    // habit dots
    v.querySelectorAll(".dots").forEach(function(row){
      row.onclick=function(e){ var b=e.target.closest(".dot"); if(!b)return; var hid=row.dataset.hid; var i=+b.dataset.i;
        var t=viewDay; S.habitLog[t]=S.habitLog[t]||{}; var cur=S.habitLog[t][hid]||0;
        S.habitLog[t][hid]= cur===i?i-1:i; save(); render(); };
    });
    // drag & drop — tasks between today lists, job cards between stages
    function clearDrag(){ [].forEach.call(v.querySelectorAll(".drag-over"),function(x){ x.classList.remove("drag-over"); }); }
    v.ondragstart=function(e){
      var li=e.target.closest&&e.target.closest(".task[data-id]");
      var jc=e.target.closest&&e.target.closest(".job-card[data-id]");
      if(li) dragTaskId=li.dataset.id; else if(jc) dragJobId=jc.dataset.id; else return;
      e.dataTransfer.effectAllowed="move"; try{ e.dataTransfer.setData("text/plain",(li||jc).dataset.id); }catch(err){}
      if(dragTaskId && S.tasks.some(function(x){return x.id===dragTaskId;})) showDragDock();
    };
    v.ondragover=function(e){
      if(dragTaskId){ var ul=e.target.closest(".tasks[data-list]"); if(ul){ e.preventDefault(); e.dataTransfer.dropEffect="move"; clearDrag(); ul.classList.add("drag-over"); } }
      else if(dragJobId){ var col=e.target.closest(".jobs-col[data-stage]"); if(col){ e.preventDefault(); e.dataTransfer.dropEffect="move"; clearDrag(); col.classList.add("drag-over"); } }
    };
    v.ondrop=function(e){
      if(dragTaskId){ var ul=e.target.closest(".tasks[data-list]"); if(ul){ e.preventDefault();
        var k=S.tasks.find(function(x){return x.id===dragTaskId;});
        if(k){ if(ul.dataset.list==="someday"){ k.day=null; k.block=null; }
          else if(ul.dataset.list==="master"){ if(!k.day) k.day=viewDay; }
          else { k.block= ul.dataset.list==="loose"?null:ul.dataset.list; if(!k.day) k.day=viewDay; }
          var tgt=e.target.closest(".task[data-id]");
          S.tasks.splice(S.tasks.indexOf(k),1);
          var to=(tgt&&tgt.dataset.id!==k.id)?S.tasks.findIndex(function(x){return x.id===tgt.dataset.id;}):-1;
          S.tasks.splice(to<0?S.tasks.length:to,0,k); save(); render(); } } }
      else if(dragJobId){ var col=e.target.closest(".jobs-col[data-stage]"); if(col){ e.preventDefault();
        var j=S.jobs.find(function(x){return x.id===dragJobId;});
        if(j&&j.stage!==col.dataset.stage){ j.stage=col.dataset.stage; save(); render(); toast("Moved to "+col.dataset.stage); } } }
      dragTaskId=null; dragJobId=null; clearDrag(); hideDragDock();
    };
    v.ondragend=function(){ dragTaskId=null; dragJobId=null; clearDrag(); hideDragDock(); };
    // generic clicks
    v.onclick=function(e){
      var a=e.target.closest("[data-act]"); if(!a)return; var act=a.dataset.act;
      var taskEl=e.target.closest(".task"); var id=taskEl&&taskEl.dataset.id;
      var idEl=e.target.closest("[data-id]"); var anyId=idEl&&idEl.dataset.id;
      if(a.closest("summary")) e.preventDefault();
      if(act==="toggle"){ toggleTask(id); }

  /* ---------- natural-language dates ---------- */
  var NLDOW={sun:0,mon:1,tue:2,wed:3,thu:4,fri:5,sat:6};
  var NLMON={jan:1,feb:2,mar:3,apr:4,may:5,jun:6,jul:7,aug:8,sep:9,oct:10,nov:11,dec:12};
  /* @-tags — @project, @morning, @tomorrow… — usable in any add box */
  function parseAtTokens(input){
    var title=input||"", day=null, block=null, projectId=null;
    var WD=/^(sun(day)?|mon(day)?|tue(s|sday)?|wed(nesday)?|thu(r|rs|rsday)?|fri(day)?|sat(urday)?)$/;
    title=title.replace(/@([A-Za-z0-9][\w&/-]*)/g,function(full,tok){
      var lt=tok.toLowerCase();
      if(lt==="morning"||lt==="afternoon"||lt==="evening"){ block=lt; return " "; }
      if(lt==="today"||lt==="anytime"){ day=today(); return " "; }
      if(lt==="tonight"){ day=today(); block=block||"evening"; return " "; }
      if(lt==="tomorrow"){ day=addDays(today(),1); return " "; }
      if(lt==="someday"){ day="someday"; return " "; }
      if(WD.test(lt)){ var w=NLDOW[lt.slice(0,3)]; day=addDays(today(),(w-dow(today())+7)%7); return " "; }
      var p=S.projects.find(function(x){return x.name.toLowerCase().indexOf(lt)===0;})||
            S.projects.find(function(x){return x.name.toLowerCase().split(/\s+/).some(function(wd2){return wd2.indexOf(lt)===0;});});
      if(p){ projectId=p.id; return " "; }
      return full;
    }).replace(/\s{2,}/g," ").trim();
    return { title:title, day:day, block:block, projectId:projectId };
  }
  function nlParse(input){
    var at=parseAtTokens(input);
    var title=at.title, day=at.day, block=at.block;
    function take(re,fn){ var mm=title.match(re); if(!mm) return false; fn(mm); title=title.replace(mm[0]," "); return true; }
    function wdDay(mm,forceNext){ var w=NLDOW[mm[1].slice(0,3).toLowerCase()]; var d=(w-dow(today())+7)%7; if(forceNext&&d===0)d=7; day=addDays(today(),d); }
    take(/\b(?:this\s+)?(morning|afternoon|evening)\b/i,function(mm){ block=mm[1].toLowerCase(); });
    take(/\bsomeday\b|\banytime\b/i,function(){ day="someday"; }) ||
    take(/\btonight\b/i,function(){ day=today(); block=block||"evening"; }) ||
    take(/\btomorrow\b/i,function(){ day=addDays(today(),1); }) ||
    take(/\btoday\b/i,function(){ day=today(); }) ||
    take(/\bin\s+(\d{1,3})\s+days?\b/i,function(mm){ day=addDays(today(),+mm[1]); }) ||
    take(/\bin\s+a\s+week\b/i,function(){ day=addDays(today(),7); }) ||
    take(/\bnext\s+(sunday|monday|tuesday|wednesday|thursday|friday|saturday|sun|mon|tue|tues|wed|thu|thur|thurs|fri|sat)\b/i,function(mm){ wdDay(mm,true); }) ||
    take(/\bon\s+(sunday|monday|tuesday|wednesday|thursday|friday|saturday|sun|mon|tue|tues|wed|thu|thur|thurs|fri|sat)\b/i,function(mm){ wdDay(mm,false); }) ||
    take(/\b(sunday|monday|tuesday|wednesday|thursday|friday|saturday)\s*$/i,function(mm){ wdDay(mm,false); }) ||
    take(/\b(jan|feb|mar|apr|may|jun|jul|aug|sep|oct|nov|dec)[a-z]*\s+(\d{1,2})\b/i,function(mm){
      var y=+today().slice(0,4); var c=y+"-"+String(NLMON[mm[1].slice(0,3).toLowerCase()]).padStart(2,"0")+"-"+String(+mm[2]).padStart(2,"0");
      if(c<today()) c=(y+1)+c.slice(4); day=c; });
    title=title.replace(/\s{2,}/g," ").trim().replace(/[,\-–—]+$/,"").trim();
    return { title: title||(input||"").trim(), day:day, block:block, projectId:at.projectId };
  }

  /* ---------- .ics import ---------- */
  function importICS(){
    var inp=document.createElement("input"); inp.type="file"; inp.accept=".ics,text/calendar";
    inp.onchange=function(){ var f=inp.files[0]; if(!f)return; var r=new FileReader();
      r.onload=function(){ var evs=expandEvents(parseEvents(r.result)); var n=0;
        evs.forEach(function(e){ if(!S.events.some(function(x){return x.uid&&x.uid===e.uid&&!x.sourceId;})){ S.events.push({id:uid(),uid:e.uid,title:e.title||"(event)",date:e.date,source:"ics"}); n++; } });
        save(); toast(n+" event"+(n===1?"":"s")+" imported"); render(); };
      r.readAsText(f); };
    inp.click();
  }
  function parseEvents(text){
    var lines=text.replace(/\r\n[ \t]/g,"").split(/\r?\n/); var cur=null,out=[];
    lines.forEach(function(l){
      if(l.indexOf("BEGIN:VEVENT")===0) cur={};
      else if(l.indexOf("END:VEVENT")===0){ if(cur&&cur.date) out.push(cur); cur=null; }
      else if(cur){
        if(l.indexOf("SUMMARY")===0) cur.title=l.slice(l.indexOf(":")+1);
        else if(l.indexOf("UID")===0) cur.uid=l.slice(l.indexOf(":")+1);
        else if(l.indexOf("RRULE")===0) cur.rrule=l.slice(l.indexOf(":")+1);
        else if(l.indexOf("DTSTART")===0){ var m=l.slice(l.indexOf(":")+1).replace(/[^0-9]/g,""); if(m.length>=8) cur.date=m.slice(0,4)+"-"+m.slice(4,6)+"-"+m.slice(6,8); }
      }
    });
    return out;
  }
  /* RRULE expansion — daily/weekly/monthly/yearly with INTERVAL, BYDAY, UNTIL, COUNT */
  var RRDOW={SU:0,MO:1,TU:2,WE:3,TH:4,FR:5,SA:6};
  function monthsBetween(a,b){ return (+b.slice(0,4)-+a.slice(0,4))*12+(+b.slice(5,7)-+a.slice(5,7)); }
  function occurrenceDates(e){
    var r={}; String(e.rrule).split(";").forEach(function(p){ var kv=p.split("="); if(kv.length===2) r[kv[0].toUpperCase()]=kv[1]; });
    var freq=r.FREQ; if(!freq) return [e.date];
    var interval=Math.max(1,+r.INTERVAL||1);
    var until=null; if(r.UNTIL){ var u=r.UNTIL.replace(/[^0-9]/g,""); if(u.length>=8) until=u.slice(0,4)+"-"+u.slice(4,6)+"-"+u.slice(6,8); }
    var count=+r.COUNT||null;
    var byday=r.BYDAY? r.BYDAY.split(",").map(function(x){ return RRDOW[x.slice(-2)]; }).filter(function(x){ return x!==undefined; }) : null;
    var winStart=addDays(today(),-60), winEnd=addDays(today(),365);
    if(until&&until<winEnd) winEnd=until;
    var start=e.date, startDow=dow(start), ws=addDays(start,-((startDow+6)%7));
    var out=[], n=0, day=start, guard=0;
    while(day<=winEnd && guard++<3200){
      var hit=false;
      if(freq==="DAILY") hit=diffDays(day,start)%interval===0;
      else if(freq==="WEEKLY") hit=(Math.floor(diffDays(day,ws)/7)%interval===0)&&(byday?byday.indexOf(dow(day))>=0:dow(day)===startDow);
      else if(freq==="MONTHLY") hit=day.slice(8)===start.slice(8)&&(monthsBetween(start,day)%interval===0);
      else if(freq==="YEARLY") hit=day.slice(5)===start.slice(5)&&((+day.slice(0,4)-+start.slice(0,4))%interval===0);
      if(hit){ n++; if(count&&n>count) break; if(day>=winStart) out.push(day); if(out.length>=500) break; }
      day=addDays(day,1);
    }
    return out;
  }
  function expandEvents(evs){
    var out=[];
    evs.forEach(function(e){
      if(!e.rrule){ out.push(e); return; }
      occurrenceDates(e).forEach(function(d){ out.push({title:e.title,uid:(e.uid||"ev")+"@"+d,date:d}); });
    });
    return out;
  }
  function sourceEnabled(ev){ if(!ev.sourceId) return true; var s=S.calSources.find(function(x){return x.id===ev.sourceId;}); return s?s.enabled!==false:true; }
  function refreshCalendars(cb){
    var list=S.calSources.filter(function(s){return s.enabled&&s.url;});
    if(!list.length){ if(cb)cb(); return; }
    var pending=list.length;
    list.forEach(function(s){
      var target=s.url.replace(/^webcal:/i,"https:");
      var url=s.useProxy?(S.proxy+encodeURIComponent(target)):target;
      fetch(url).then(function(r){ if(!r.ok) throw 0; return r.text(); }).then(function(txt){
        S.events=S.events.filter(function(e){return e.sourceId!==s.id;});
        var evs=expandEvents(parseEvents(txt)); evs.forEach(function(e){ S.events.push({id:uid(),uid:e.uid,title:e.title||"(event)",date:e.date,sourceId:s.id,color:s.color}); });
        s.count=evs.length; s.lastSync=Date.now(); s.error=null;
      }).catch(function(){ s.error="Couldn't fetch — the calendar host likely blocks browser access. Turn on the proxy option, or import the .ics file instead."; })
      .then(function(){ if(--pending===0){ save(); if(cb)cb(); } });
    });
  }

  /* ---------- optional sync file (File System Access — Chrome/Edge) ---------- */
  var syncHandle=null, syncName=null, syncReconnect=false, syncTimer=null;
  function idb(cb){ try{ var rq=indexedDB.open("daybook-idb",1); rq.onupgradeneeded=function(){ rq.result.createObjectStore("kv"); }; rq.onsuccess=function(){ cb(rq.result); }; rq.onerror=function(){ cb(null); }; }catch(e){ cb(null); } }
  function idbSet(k,v){ idb(function(db){ if(!db)return; try{ db.transaction("kv","readwrite").objectStore("kv").put(v,k); }catch(e){} }); }
  function idbGet(k,cb){ idb(function(db){ if(!db){cb(null);return;} try{ var rq=db.transaction("kv").objectStore("kv").get(k); rq.onsuccess=function(){ cb(rq.result||null); }; rq.onerror=function(){ cb(null); }; }catch(e){ cb(null); } }); }
  function scheduleSync(){ if(!syncHandle) return; clearTimeout(syncTimer); syncTimer=setTimeout(syncWrite,1200); }
  function syncWrite(){ if(!syncHandle) return;
    syncHandle.queryPermission({mode:"readwrite"}).then(function(p){ if(p!=="granted") return;
      syncHandle.createWritable().then(function(w){ return w.write(JSON.stringify(S)).then(function(){ return w.close(); }); }).catch(function(){});
    }).catch(function(){});
  }
  function syncRead(){ if(!syncHandle) return;
    syncHandle.getFile().then(function(f){ return f.text(); }).then(function(txt){
      var d=JSON.parse(txt);
      if(d&&d.version&&d.savedAt&&d.savedAt>bootSavedAt){
        confirmModal("Load newer data from sync file?","The sync file was saved more recently than this device — likely from your other device. Load it here?","Load it",function(){ S=normalize(d); save(); applyTheme(); fillProjSelect(); render(); toast("Loaded from sync file"); });
      }
    }).catch(function(){});
  }
  function linkSyncFile(){
    if(!window.showSaveFilePicker){ toast("Sync file needs Chrome or Edge"); return; }
    window.showSaveFilePicker({suggestedName:"daybook-sync.json",types:[{description:"Daybook data",accept:{"application/json":[".json"]}}]}).then(function(h){
      syncHandle=h; syncName=h.name; idbSet("syncHandle",h); idbSet("syncName",h.name); close();
      h.getFile().then(function(f){ return f.text(); }).then(function(txt){
        var d=null; try{ d=JSON.parse(txt); }catch(e){}
        if(d&&d.version&&d.savedAt&&d.savedAt>bootSavedAt){ syncRead(); } else { syncWrite(); toast("Sync file linked — changes auto-save there"); }
      }).catch(function(){ syncWrite(); toast("Sync file linked — changes auto-save there"); });
    }).catch(function(){});
  }

  /* ---------- optional cloud sync via a GitHub gist (free, no server) ---------- */
  var GH_KEY="daybook-gh", GH_FILE="daybook.json", GH_DESC="Daybook sync";
  var GH=null, ghTimer=null, ghLastSync=null, ghError=null;
  try{ GH=JSON.parse(localStorage.getItem(GH_KEY))||null; }catch(e){ GH=null; }
  function ghSaveCfg(){ if(GH&&GH.token) localStorage.setItem(GH_KEY,JSON.stringify(GH)); else localStorage.removeItem(GH_KEY); }
  function ghApi(method,path,body){
    return fetch("https://api.github.com"+path,{method:method,
      headers:{Authorization:"Bearer "+GH.token,Accept:"application/vnd.github+json"},
      body:body?JSON.stringify(body):undefined
    }).then(function(r){ if(!r.ok) throw new Error("GitHub replied "+r.status); return r.status===204?null:r.json(); });
  }
  function scheduleGh(){ if(!GH||!GH.token||!GH.gistId) return; clearTimeout(ghTimer); ghTimer=setTimeout(ghPush,1500); }
  function ghPush(){
    if(!GH||!GH.token||!GH.gistId) return;
    ghApi("PATCH","/gists/"+GH.gistId,{files:{"daybook.json":{content:JSON.stringify(S)}}})
      .then(function(){ ghLastSync=Date.now(); ghError=null; })
      .catch(function(e){ ghError=e.message; });
  }
  function ghFetchData(cb){
    ghApi("GET","/gists/"+GH.gistId).then(function(g){
      var f=g&&g.files&&g.files[GH_FILE];
      if(!f){ cb(null); return; }
      if(f.truncated){ fetch(f.raw_url).then(function(r){return r.text();}).then(function(t){ cb(parseGh(t)); }).catch(function(){ cb(null); }); }
      else cb(parseGh(f.content));
    }).catch(function(e){ ghError=e.message; cb(null); });
  }
  function parseGh(t){ try{ var d=JSON.parse(t); return (d&&d.version)?d:null; }catch(e){ return null; } }
  function ghPull(){
    if(!GH||!GH.token||!GH.gistId) return;
    ghFetchData(function(d){
      if(!d) return;
      ghLastSync=Date.now();
      if(d.savedAt&&d.savedAt>(S.savedAt||0)){
        confirmModal("Load newer data from the cloud?","Your GitHub sync copy was saved more recently than this device — likely from another browser or computer. Load it here?","Load it",function(){ S=normalize(d); save(); applyTheme(); fillProjSelect(); render(); toast("Loaded from cloud sync"); });
      }
    });
  }
  function openGhModal(){
    var connected=GH&&GH.token&&GH.gistId;
    if(connected){
      modal('<h3>☁️ Cloud sync — connected</h3>'+
        '<p class="sub">Every change auto-saves to a secret gist on your GitHub account. Open Daybook in any browser, connect with the same token, and pick up where you left off.</p>'+
        '<div class="sub" style="font-size:12px;margin:10px 0">'+(ghError?"⚠ Last sync failed: "+esc(ghError):(ghLastSync?"Last synced "+new Date(ghLastSync).toLocaleTimeString():"Not synced yet this session"))+'</div>'+
        '<div class="stack">'+
        '<button class="btn" id="gh-now">↻ Sync now</button>'+
        '<button class="btn ghost" id="gh-off" style="color:var(--terra-deep)">Disconnect (forget the token on this device)</button>'+
        '</div><div class="modal-actions"><button class="btn primary" data-x>Done</button></div>');
      document.querySelector("[data-x]").onclick=close;
      document.getElementById("gh-now").onclick=function(){ toast("Syncing…"); ghPush(); ghPull(); };
      document.getElementById("gh-off").onclick=function(){ GH=null; ghSaveCfg(); close(); toast("Cloud sync disconnected"); };
      return;
    }
    modal('<h3>☁️ Cloud sync via GitHub — free, no server</h3>'+
      '<p class="sub" style="margin-bottom:12px">Saves your data to a <b>secret gist</b> on your own GitHub account, so it follows you to any browser or computer. Your data stays yours — this app talks only to github.com.</p>'+
      '<div class="stack" style="font-size:13.5px;line-height:1.55">'+
      '<div><b>1.</b> Create a free account at <b>github.com</b> (skip if you have one).</div>'+
      '<div><b>2.</b> Go to <b>Settings → Developer settings → Personal access tokens → Tokens (classic) → Generate new token (classic)</b>.</div>'+
      '<div><b>3.</b> Name it “Daybook”, pick an expiration, and tick <b>only the “gist” scope</b>. Generate, then copy the token.</div>'+
      '<div><b>4.</b> Paste it below. Treat the token like a password — it is stored only in this browser.</div>'+
      '</div>'+
      '<div class="fld"><label>Personal access token</label><input id="gh-token" placeholder="ghp_…" autocomplete="off"/></div>'+
      '<div class="sub" style="font-size:11px">Note: secret gists are hidden from listings but readable by anyone who has their URL. Fine for a task list — don\'t keep truly sensitive secrets in Daybook.</div>'+
      '<div class="modal-actions"><button class="btn ghost" data-x>Cancel</button><button class="btn primary" id="gh-go">Connect</button></div>');
    document.querySelector("[data-x]").onclick=close;
    document.getElementById("gh-go").onclick=function(){
      var tok=document.getElementById("gh-token").value.trim();
      if(!tok){ toast("Paste the token first"); return; }
      GH={token:tok,gistId:null};
      toast("Connecting…");
      ghApi("GET","/gists?per_page=100").then(function(list){
        var g=(list||[]).find(function(x){ return x.description===GH_DESC || (x.files&&x.files[GH_FILE]); });
        if(g){
          GH.gistId=g.id; ghSaveCfg(); close();
          ghFetchData(function(d){
            if(d&&d.savedAt&&d.savedAt>(S.savedAt||0)){
              confirmModal("Found your Daybook in the cloud","It was saved more recently than this device. Load it here? (Cancel keeps this device\'s data and uploads it instead.)","Load cloud copy",function(){ S=normalize(d); save(); applyTheme(); fillProjSelect(); render(); toast("Loaded from cloud"); });
              ghLastSync=Date.now();
            } else { ghPush(); toast("Connected — this device\'s data uploaded"); }
          });
        } else {
          ghApi("POST","/gists",{description:GH_DESC,public:false,files:{"daybook.json":{content:JSON.stringify(S)}}}).then(function(ng){
            GH.gistId=ng.id; ghSaveCfg(); ghLastSync=Date.now(); close(); toast("Connected — cloud sync is on");
          }).catch(function(e){ GH=null; toast("Couldn\'t create the gist — "+e.message); });
        }
      }).catch(function(e){ GH=null; toast("Token didn\'t work — "+e.message); });
    };
  }

  function mergeData(inc){
    var added=0;
    ["projects","tasks","templates","habits","events","phases","people","emails","jobs","improve","calSources"].forEach(function(key){
      var have={}; S[key].forEach(function(x){ if(x&&x.id) have[x.id]=1; });
      (inc[key]||[]).forEach(function(x){ if(x&&x.id&&!have[x.id]){ S[key].push(x); added++; } });
    });
    Object.keys(inc.notes||{}).forEach(function(k){ if(!S.notes[k]){ S.notes[k]=inc.notes[k]; added++; } });
    Object.keys(inc.focus||{}).forEach(function(k){ if(!(S.focus[k]&&S.focus[k].length)){ S.focus[k]=inc.focus[k]; added++; } });
    Object.keys(inc.habitLog||{}).forEach(function(k){ if(!S.habitLog[k]){ S.habitLog[k]=inc.habitLog[k]; added++; } });
    (inc.dismissed||[]).forEach(function(x){ if(S.dismissed.indexOf(x)<0) S.dismissed.push(x); });
    return added;
  }

        '<h3>'+esc(p.name)+'</h3><div class="pmeta">'+esc(p.relationship||"—")+(p.company?" · "+esc(p.company):"")+'</div></div>'+
